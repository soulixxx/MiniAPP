<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My SoundCloud Likes</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      color: #fff;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 24px;
    }
    .logo { font-size: 64px; }
    h1 { font-size: 22px; font-weight: 600; }
    p { color: #aaa; font-size: 14px; text-align: center; padding: 0 32px; }
    a {
      background: #FF5500;
      color: #fff;
      text-decoration: none;
      padding: 14px 32px;
      border-radius: 30px;
      font-size: 16px;
      font-weight: 600;
    }
    a:active { opacity: 0.8; }
  </style>
</head>
<body>
  <div class="logo">🎧</div>
  <h1>Мои лайки</h1>
  <p>SoundCloud не разрешает встраивание. Нажми кнопку — откроется в браузере.</p>
  <a href="https://soundcloud.com/you/likes" target="_blank">Открыть лайки</a>

  <script>
    Telegram.WebApp.ready();
    Telegram.WebApp.expand();
  </script>
</body>
</html>
