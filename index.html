<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Roulette</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; font-family: sans-serif; color: #fff; min-height: 100vh; }
    .wrap { padding: 32px 20px; display: flex; flex-direction: column; align-items: center; gap: 24px; }
    .title { font-size: 22px; font-weight: 800; text-align: center; }
    .title span { color: #FF5500; }
    .wheel-wrap { position: relative; width: 280px; height: 280px; }
    canvas { border-radius: 50%; display: block; }
    .pointer { position: absolute; top: -18px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 12px solid transparent; border-right: 12px solid transparent; border-top: 24px solid #FF5500; }
    .center-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 64px; height: 64px; border-radius: 50%; background: #FF5500; border: 4px solid #0a0a0a; cursor: pointer; font-size: 24px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 0 2px #FF550055; }
    .result-card { width: 100%; max-width: 320px; background: #161616; border: 1px solid #ffffff15; border-radius: 20px; padding: 20px; text-align: center; min-height: 120px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; transition: border-color 0.3s; }
    .result-card.lit { border-color: #FF5500; }
    .result-emoji { font-size: 40px; animation: pop 0.4s ease; }
    @keyframes pop { 0% { transform: scale(0.5); opacity: 0; } 60% { transform: scale(1.2); } 100% { transform: scale(1); opacity: 1; } }
    .result-genre { font-size: 20px; font-weight: 800; }
    .result-mood { font-size: 13px; color: #888; }
    .result-link { display: inline-flex; align-items: center; gap: 6px; margin-top: 12px; background: #FF5500; color: #fff; text-decoration: none; padding: 10px 22px; border-radius: 30px; font-size: 14px; font-weight: 700; }
    .mood-btn { background: #161616; border: 1px solid #ffffff15; border-radius: 20px; padding: 8px 16px; font-size: 13px; color: #aaa; cursor: pointer; }
    .mood-btn.active { background: #FF550022; border-color: #FF5500; color: #FF5500; }
    .lucky-row { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; max-width: 320px; }
    .spin-count { font-size: 13px; color: #555; }
    .spin-count span { color: #FF5500; font-weight: 700; }
    .spins-row { display: flex; gap: 10px; align-items: center; }
    .history-title { font-size: 12px; color: #444; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.08em; }
    .history-list { display: flex; flex-wrap: wrap; gap: 6px; }
    .hist-pill { background: #161616; border: 1px solid #ffffff10; border-radius: 20px; padding: 4px 12px; font-size: 12px; color: #888; }
    .history { width: 100%; max-width: 320px; }
    .likes-btn { display: flex; align-items: center; gap: 8px; background: #FF5500; color: #fff; text-decoration: none; padding: 14px 32px; border-radius: 50px; font-size: 15px; font-weight: 700; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="title">Музыкальная <span>рулетка</span> 🎰</div>

  <div class="wheel-wrap">
    <canvas id="wheel" width="280" height="280"></canvas>
    <div class="pointer"></div>
    <button class="center-btn" id="spinBtn">🎵</button>
  </div>

  <div class="result-card" id="resultCard">
    <div style="font-size:14px;color:#444">Нажми кнопку в центре колеса</div>
  </div>

  <div class="lucky-row" id="moodFilter">
    <button class="mood-btn active" data-mood="all">Все</button>
    <button class="mood-btn" data-mood="энергия">Энергия</button>
    <button class="mood-btn" data-mood="расслабон">Расслабон</button>
    <button class="mood-btn" data-mood="грусть">Грусть</button>
    <button class="mood-btn" data-mood="концентрация">Фокус</button>
  </div>

  <div class="spins-row">
    <div class="spin-count">Прокруток: <span id="spinCountEl">0</span></div>
    <div class="spin-count" style="margin-left:12px">Серия: <span id="streakEl">0</span> 🔥</div>
  </div>

  <div class="history" id="historyWrap" style="display:none">
    <div class="history-title">История</div>
    <div class="history-list" id="historyList"></div>
  </div>

  <a class="likes-btn" href="https://soundcloud.com/you/likes" target="_blank">🎧 Мои лайки</a>
</div>

<script>
const genres = [
  {name:"Lo-fi",emoji:"☁️",mood:"расслабон",color:"#7F77DD",search:"lofi hip hop"},
  {name:"Drum & Bass",emoji:"⚡",mood:"энергия",color:"#FF5500",search:"drum and bass"},
  {name:"Ambient",emoji:"🌊",mood:"расслабон",color:"#1D9E75",search:"ambient"},
  {name:"Trap",emoji:"🔥",mood:"энергия",color:"#D85A30",search:"trap beats"},
  {name:"Jazz",emoji:"🎷",mood:"расслабон",color:"#BA7517",search:"jazz"},
  {name:"Phonk",emoji:"💀",mood:"энергия",color:"#993556",search:"phonk"},
  {name:"Chillwave",emoji:"🌅",mood:"расслабон",color:"#378ADD",search:"chillwave"},
  {name:"Indie",emoji:"🎸",mood:"грусть",color:"#639922",search:"indie rock"},
  {name:"Dark Ambient",emoji:"🌑",mood:"грусть",color:"#534AB7",search:"dark ambient"},
  {name:"Study Beats",emoji:"📚",mood:"концентрация",color:"#5DCAA5",search:"study beats"},
  {name:"Hyperpop",emoji:"🦄",mood:"энергия",color:"#D4537E",search:"hyperpop"},
  {name:"Neo Soul",emoji:"✨",mood:"грусть",color:"#EF9F27",search:"neo soul"},
];

const canvas = document.getElementById('wheel');
const ctx = canvas.getContext('2d');
const spinBtn = document.getElementById('spinBtn');
const resultCard = document.getElementById('resultCard');
const spinCountEl = document.getElementById('spinCountEl');
const streakEl = document.getElementById('streakEl');
const historyList = document.getElementById('historyList');
const historyWrap = document.getElementById('historyWrap');

let angle = 0, spinning = false, spinCount = 0, streak = 0, lastMood = null, activeMood = 'all';

function getFiltered() {
  return activeMood === 'all' ? genres : genres.filter(g => g.mood === activeMood);
}

function drawWheel(items, rot) {
  const cx = 140, cy = 140, r = 130;
  const arc = (2 * Math.PI) / items.length;
  ctx.clearRect(0, 0, 280, 280);
  items.forEach((g, i) => {
    const start = rot + i * arc, end = start + arc;
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.arc(cx, cy, r, start, end); ctx.closePath();
    ctx.fillStyle = g.color + 'cc'; ctx.fill();
    ctx.strokeStyle = '#0a0a0a'; ctx.lineWidth = 2; ctx.stroke();
    ctx.save(); ctx.translate(cx, cy); ctx.rotate(start + arc / 2);
    ctx.textAlign = 'right'; ctx.fillStyle = '#fff'; ctx.font = 'bold 12px sans-serif';
    ctx.fillText(g.name, r - 10, 4);
    ctx.font = '14px sans-serif'; ctx.fillText(g.emoji, r - 10 - ctx.measureText(g.name).width - 4, 4);
    ctx.restore();
  });
  ctx.beginPath(); ctx.arc(cx, cy, 32, 0, 2 * Math.PI);
  ctx.fillStyle = '#0a0a0a'; ctx.fill(); ctx.strokeStyle = '#FF5500'; ctx.lineWidth = 2; ctx.stroke();
}

function spin() {
  if (spinning) return;
  const filtered = getFiltered();
  if (!filtered.length) return;
  spinning = true; spinBtn.textContent = '⏳';
  const extra = 6 * 2 * Math.PI + Math.random() * 2 * Math.PI;
  const duration = 3000 + Math.random() * 1500;
  const start = performance.now(), startAngle = angle;
  function ease(t) { return 1 - Math.pow(1 - t, 4); }
  function frame(now) {
    const t = Math.min((now - start) / duration, 1);
    angle = startAngle + extra * ease(t);
    drawWheel(filtered, angle);
    if (t < 1) { requestAnimationFrame(frame); return; }
    spinning = false; spinBtn.textContent = '🎵';
    const arc = (2 * Math.PI) / filtered.length;
    const norm = ((-angle % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
    const idx = Math.floor(norm / arc) % filtered.length;
    const winner = filtered[(filtered.length - 1 - idx + filtered.length) % filtered.length];
    resultCard.classList.add('lit');
    resultCard.innerHTML = `<div class="result-emoji">${winner.emoji}</div><div class="result-genre">${winner.name}</div><div class="result-mood">${winner.mood}</div><a class="result-link" href="https://soundcloud.com/search?q=${encodeURIComponent(winner.search)}" target="_blank">Слушать →</a>`;
    spinCount++; spinCountEl.textContent = spinCount;
    streak = lastMood === winner.mood ? streak + 1 : 1;
    lastMood = winner.mood; streakEl.textContent = streak;
    historyWrap.style.display = 'block';
    const pill = document.createElement('div'); pill.className = 'hist-pill';
    pill.textContent = winner.emoji + ' ' + winner.name; historyList.prepend(pill);
    if (historyList.children.length > 6) historyList.lastChild.remove();
  }
  requestAnimationFrame(frame);
}

document.querySelectorAll('.mood-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active'); activeMood = btn.dataset.mood;
    drawWheel(getFiltered(), angle);
  });
});

spinBtn.addEventListener('click', spin);
drawWheel(genres, angle);

Telegram.WebApp.ready();
Telegram.WebApp.expand();
</script>
</body>
</html>
