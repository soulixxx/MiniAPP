<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TonCasino</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#080c14;--surface:#0d1120;--card:#111827;--card2:#141d2e;--border:rgba(255,255,255,0.07);
  --accent:#7c3aed;--accent2:#4f46e5;--neon:#a78bfa;--green:#22c55e;--red:#ef4444;
  --gold:#f59e0b;--pink:#f472b6;--text:#e2e8f0;--muted:#4b5563;--soft:#94a3b8;
}
html,body,#root{height:100%;overflow:hidden}
body{background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);overscroll-behavior:none;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:2px;height:2px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#ffffff15;border-radius:99px}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{transform:scale(0.3) rotate(-8deg);opacity:0}60%{transform:scale(1.18) rotate(2deg)}to{transform:scale(1) rotate(0);opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes pulse-glow{0%,100%{box-shadow:0 0 0px transparent}50%{box-shadow:0 0 24px var(--neon)}}
@keyframes notif{0%{transform:translateX(120%);opacity:0}8%{transform:translateX(0);opacity:1}85%{transform:translateX(0);opacity:1}100%{transform:translateX(120%);opacity:0}}
@keyframes shimmer{0%{background-position:-200% 0}to{background-position:200% 0}}
@keyframes live-dot{0%,100%{opacity:1}50%{opacity:0.3}}
@keyframes crash-up{from{stroke-dashoffset:2000}to{stroke-dashoffset:0}}
input{outline:none;-webkit-appearance:none}
button{-webkit-appearance:none;cursor:pointer}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, createContext, useContext } = React;

// ══════════════════════════════════════════════════════════
// DATA
// ══════════════════════════════════════════════════════════
const GIFTS = [
  {id:"pepe",   name:"Plush Pepe",    emoji:"🐸", rarity:"common",    value:12,  desc:"The original meme frog"},
  {id:"fish",   name:"Golden Fish",   emoji:"🐟", rarity:"common",    value:9,   desc:"Make a wish"},
  {id:"bear",   name:"Star Bear",     emoji:"🐻", rarity:"common",    value:14,  desc:"Fluffy with stars"},
  {id:"cat",    name:"Fire Cat",      emoji:"🐱", rarity:"common",    value:10,  desc:"Hot tempered kitty"},
  {id:"torch",  name:"Chill Torch",   emoji:"🔦", rarity:"common",    value:11,  desc:"Light the dark"},
  {id:"cherry", name:"Cherry Heart",  emoji:"🍒", rarity:"common",    value:13,  desc:"Sweet and juicy"},
  {id:"ball",   name:"Magic Ball",    emoji:"🔮", rarity:"rare",      value:65,  desc:"Sees your future"},
  {id:"ice",    name:"Ice Crystal",   emoji:"❄️", rarity:"rare",      value:58,  desc:"Eternal frost"},
  {id:"moon",   name:"Moon Stone",    emoji:"🌙", rarity:"rare",      value:72,  desc:"Fell from the moon"},
  {id:"flower", name:"Fire Bloom",    emoji:"🌺", rarity:"rare",      value:68,  desc:"Blooms once a century"},
  {id:"cigar",  name:"Lucky Cigar",   emoji:"🎯", rarity:"rare",      value:60,  desc:"Smooth operator"},
  {id:"cap",    name:"Durov Cap",     emoji:"🧢", rarity:"epic",      value:210, desc:"Wear the founder's style"},
  {id:"star",   name:"TG Star",       emoji:"⭐", rarity:"epic",      value:185, desc:"A real Telegram star"},
  {id:"dragon", name:"Lucky Dragon",  emoji:"🐉", rarity:"epic",      value:230, desc:"Fortune favors you"},
  {id:"frog",   name:"Golden Frog",   emoji:"🐊", rarity:"epic",      value:195, desc:"Leap of fortune"},
  {id:"phoenix",name:"Phoenix",       emoji:"🦅", rarity:"legendary", value:620, desc:"Reborn from ash"},
  {id:"unicorn",name:"Unicorn",       emoji:"🦄", rarity:"legendary", value:720, desc:"One of one"},
  {id:"swan",   name:"White Swan",    emoji:"🦢", rarity:"legendary", value:580, desc:"Graceful and rare"},
  {id:"crown",  name:"Pavel's Crown", emoji:"👑", rarity:"mythic",    value:1600,desc:"Only for the chosen"},
  {id:"gem",    name:"Infinity Gem",  emoji:"💠", rarity:"mythic",    value:2100,desc:"Controls the universe"},
];

const RARITY = {
  common:    {label:"Common",    color:"#9ca3af", glow:"#6b7280", bg:"rgba(156,163,175,0.10)"},
  rare:      {label:"Rare",      color:"#60a5fa", glow:"#3b82f6", bg:"rgba(96,165,250,0.12)"},
  epic:      {label:"Epic",      color:"#a78bfa", glow:"#7c3aed", bg:"rgba(167,139,250,0.13)"},
  legendary: {label:"Legendary", color:"#f59e0b", glow:"#d97706", bg:"rgba(245,158,11,0.12)"},
  mythic:    {label:"Mythic",    color:"#f472b6", glow:"#ec4899", bg:"rgba(244,114,182,0.12)"},
};

const CASES = [
  {name:"Basic",   icon:"📦", price:50,  pool:[{r:"common",w:65},{r:"rare",w:25},{r:"epic",w:8},{r:"legendary",w:1.8},{r:"mythic",w:0.2}]},
  {name:"Premium", icon:"🎁", price:150, pool:[{r:"common",w:35},{r:"rare",w:35},{r:"epic",w:20},{r:"legendary",w:8},{r:"mythic",w:2}]},
  {name:"Legend",  icon:"👑", price:500, pool:[{r:"common",w:5},{r:"rare",w:20},{r:"epic",w:35},{r:"legendary",w:30},{r:"mythic",w:10}]},
];

const FNAMES = ["Alex K","Maria V","John D","Kai L","Sara M","Dmitri P","Lena B","Omar Z","Yuki T","Nina S","Pavel R","Mia C"];
const FUSERS = ["crypto_whale","ton_hunter","nft_king","gem_lord","moon_boy","whale_alert","star_trader","hodl_chad","block_ninja","vip_player"];

// ══════════════════════════════════════════════════════════
// STORAGE
// ══════════════════════════════════════════════════════════
function storeKey(uid){ return `tgc_${uid}`; }
function loadData(uid){
  try{ const r=localStorage.getItem(storeKey(uid)); return r?JSON.parse(r):null; }catch{ return null; }
}
function saveData(uid,data){
  try{ localStorage.setItem(storeKey(uid),JSON.stringify(data)); }catch{}
}
function defaultData(){
  return {balance:1000,inventory:{},upgradeStats:{attempts:0,successes:0},crashHistory:[],rouletteHistory:[],totalSpins:0,totalEarned:0,xp:0,level:1,dailyAt:0,recentWins:[]};
}

// ══════════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════════
function weightedRandom(pool){
  const t=pool.reduce((s,p)=>s+p.w,0); let r=Math.random()*t;
  for(const p of pool){r-=p.w;if(r<=0)return p.r;} return pool[pool.length-1].r;
}
function giftsByRarity(r){ return GIFTS.filter(g=>g.rarity===r); }
function randomGift(r){ const o=giftsByRarity(r); return o[Math.floor(Math.random()*o.length)]; }
function lvl(xp){ return Math.max(1,Math.floor(Math.sqrt(xp/80))+1); }
function xpNext(lv){ return lv*lv*80; }
function xpThis(lv){ return Math.max(0,(lv-1)*(lv-1)*80); }

// ══════════════════════════════════════════════════════════
// CONTEXT
// ══════════════════════════════════════════════════════════
const Ctx = createContext(null);
const useApp = ()=>useContext(Ctx);

function AppProvider({children}){
  const [uid,setUid]=useState("demo");
  const [user,setUser]=useState({name:"Demo User",username:"@demo",photo:null});
  const [data,setDataRaw]=useState(defaultData());
  const [sound,setSound]=useState(true);
  const [notif,setNotif]=useState(null);
  const notifRef=useRef(null);

  useEffect(()=>{
    let u={name:"Demo User",username:"@demo",photo:null}, id="demo";
    try{
      const tg=window.Telegram?.WebApp;
      if(tg){
        tg.ready(); tg.expand();
        tg.setBackgroundColor("#080c14");
        tg.setHeaderColor("#0d1120");
        const tu=tg.initDataUnsafe?.user;
        if(tu?.id){
          id=String(tu.id);
          u={name:[tu.first_name,tu.last_name].filter(Boolean).join(" ")||"User",username:tu.username?`@${tu.username}`:"",photo:tu.photo_url||null};
        }
      }
    }catch{}
    setUid(id); setUser(u);
    const saved=loadData(id);
    if(saved) setDataRaw(d=>({...d,...saved,level:lvl(saved.xp||0)}));
  },[]);

  const setData=useCallback(fn=>{
    setDataRaw(prev=>{
      const next=typeof fn==="function"?fn(prev):{...prev,...fn};
      next.level=lvl(next.xp||0);
      saveData(uid,next);
      return next;
    });
  },[uid]);

  const notify=useCallback((msg,type="success")=>{
    setNotif({msg,type,id:Date.now()});
    clearTimeout(notifRef.current);
    notifRef.current=setTimeout(()=>setNotif(null),3000);
  },[]);

  const addItem=useCallback(gift=>{
    setData(prev=>{
      const inv={...prev.inventory};
      if(!inv[gift.id])inv[gift.id]={...gift,count:0};
      inv[gift.id]={...inv[gift.id],count:inv[gift.id].count+1};
      return {...prev,inventory:inv};
    });
  },[setData]);

  const removeItem=useCallback(id=>{
    setData(prev=>{
      const inv={...prev.inventory};
      if(!inv[id]||inv[id].count<1)return prev;
      inv[id]={...inv[id],count:inv[id].count-1};
      if(inv[id].count<=0)delete inv[id];
      return {...prev,inventory:inv};
    });
  },[setData]);

  const claimDaily=useCallback(()=>{
    if(Date.now()-data.dailyAt<86400000){notify("Come back tomorrow! ⏰","error");return;}
    const reward=250+Math.floor(Math.random()*250);
    setData(prev=>({...prev,balance:prev.balance+reward,xp:prev.xp+60,dailyAt:Date.now()}));
    notify(`🎁 Daily reward: +${reward} ⭐`);
  },[data.dailyAt,setData,notify]);

  const canDaily=Date.now()-data.dailyAt>=86400000;

  return(
    <Ctx.Provider value={{uid,user,data,setData,sound,setSound,notif,notify,addItem,removeItem,claimDaily,canDaily}}>
      {children}
    </Ctx.Provider>
  );
}

// ══════════════════════════════════════════════════════════
// UI ATOMS
// ══════════════════════════════════════════════════════════
function Badge({rarity}){
  const c=RARITY[rarity]||RARITY.common;
  return <span style={{fontSize:9,fontWeight:700,padding:"2px 7px",borderRadius:99,background:c.bg,color:c.color,border:`1px solid ${c.color}44`,fontFamily:"Syne,sans-serif",letterSpacing:"0.04em"}}>{c.label}</span>;
}

function Card({children,style,onClick,rarity,glow}){
  const gc=rarity?RARITY[rarity]?.glow:glow||"#7c3aed";
  const [hover,setHover]=useState(false);
  return(
    <div onClick={onClick}
      onMouseEnter={()=>setHover(true)} onMouseLeave={()=>setHover(false)}
      style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:16,position:"relative",overflow:"hidden",
        transition:"transform 0.15s,box-shadow 0.2s",cursor:onClick?"pointer":"default",
        transform:hover&&onClick?"translateY(-2px)":"none",
        boxShadow:hover&&onClick?`0 8px 28px ${gc}28`:"none",
        ...style}}>
      {children}
    </div>
  );
}

function Btn({children,onClick,style,disabled,variant="primary"}){
  const [pressed,setPressed]=useState(false);
  const variants={
    primary:{background:"linear-gradient(135deg,#7c3aed,#4f46e5)",color:"#fff"},
    success:{background:"linear-gradient(135deg,#15803d,#22c55e)",color:"#fff"},
    danger: {background:"linear-gradient(135deg,#b91c1c,#ef4444)",color:"#fff"},
    ghost:  {background:"rgba(255,255,255,0.06)",color:"var(--soft)",border:"1px solid var(--border)"},
    gold:   {background:"linear-gradient(135deg,#92400e,#f59e0b)",color:"#fff"},
    green:  {background:"linear-gradient(135deg,#15803d,#22c55e)",color:"#fff"},
  };
  return(
    <button
      disabled={disabled}
      onClick={onClick}
      onMouseDown={()=>!disabled&&setPressed(true)}
      onMouseUp={()=>setPressed(false)}
      onTouchStart={()=>!disabled&&setPressed(true)}
      onTouchEnd={()=>setPressed(false)}
      style={{border:"none",borderRadius:13,padding:"13px 18px",fontSize:13,fontWeight:700,
        cursor:disabled?"not-allowed":"pointer",opacity:disabled?0.4:1,
        transition:"transform 0.1s,opacity 0.15s",transform:pressed&&!disabled?"scale(0.97)":"scale(1)",
        display:"flex",alignItems:"center",justifyContent:"center",gap:6,
        fontFamily:"Syne,sans-serif",...variants[variant],...style}}>
      {children}
    </button>
  );
}

function Pill({label,value,color="var(--neon)"}){
  return(
    <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:12,padding:"8px 10px",textAlign:"center",flex:1,minWidth:0}}>
      <div style={{fontSize:15,fontWeight:800,color,fontFamily:"Syne,sans-serif",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{value}</div>
      <div style={{fontSize:8,color:"var(--muted)",marginTop:2,textTransform:"uppercase",letterSpacing:"0.06em"}}>{label}</div>
    </div>
  );
}

function Ava({user,size=52}){
  const [err,setErr]=useState(false);
  const init=(user.name||"U").charAt(0).toUpperCase();
  if(user.photo&&!err){
    return <img src={user.photo} onError={()=>setErr(true)} alt="" style={{width:size,height:size,borderRadius:"50%",objectFit:"cover",border:"2px solid var(--accent)",flexShrink:0}}/>;
  }
  return <div style={{width:size,height:size,borderRadius:"50%",background:"linear-gradient(135deg,#7c3aed,#4f46e5)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:size*0.38,fontWeight:900,color:"#fff",border:"2px solid var(--accent)",fontFamily:"Syne,sans-serif",flexShrink:0}}>{init}</div>;
}

function XpBar({xp,level}){
  const cur=xpThis(level), nxt=xpNext(level);
  const pct=Math.min(100,nxt>cur?((xp-cur)/(nxt-cur))*100:100);
  return(
    <div style={{width:"100%"}}>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:"var(--muted)",marginBottom:3}}>
        <span style={{fontFamily:"Syne,sans-serif",fontWeight:700,color:"var(--neon)"}}>LV {level}</span>
        <span>{Math.round(pct)}% → LV {level+1}</span>
      </div>
      <div style={{height:3,background:"var(--border)",borderRadius:99,overflow:"hidden"}}>
        <div style={{height:"100%",width:`${pct}%`,background:"linear-gradient(90deg,var(--accent),var(--neon))",borderRadius:99,transition:"width 0.8s ease"}}/>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════
// LIVE FEED
// ══════════════════════════════════════════════════════════
function useLiveFeed(){
  const [feed,setFeed]=useState([]);
  useEffect(()=>{
    const add=()=>{
      const g=GIFTS[Math.floor(Math.random()*GIFTS.length)];
      const u=FUSERS[Math.floor(Math.random()*FUSERS.length)];
      setFeed(p=>[{id:Date.now(),u,g},...p].slice(0,25));
    };
    add();
    const iv=setInterval(add,2200+Math.random()*2800);
    return()=>clearInterval(iv);
  },[]);
  return feed;
}

function LiveBar({feed}){
  return(
    <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:2,scrollbarWidth:"none"}}>
      {feed.slice(0,14).map(item=>{
        const c=RARITY[item.g.rarity];
        return(
          <div key={item.id} style={{display:"flex",alignItems:"center",gap:5,background:"var(--card2)",border:`1px solid ${c.color}30`,borderRadius:99,padding:"4px 10px",whiteSpace:"nowrap",flexShrink:0,animation:"fadeUp 0.35s ease"}}>
            <span style={{fontSize:13}}>{item.g.emoji}</span>
            <span style={{fontSize:9,color:c.color,fontWeight:700,fontFamily:"Syne,sans-serif"}}>{item.u}</span>
            <span style={{fontSize:9,color:"var(--muted)"}}>won</span>
            <span style={{fontSize:9,color:"var(--text)",fontWeight:600}}>{item.g.name}</span>
          </div>
        );
      })}
    </div>
  );
}

// ══════════════════════════════════════════════════════════
// HOME
// ══════════════════════════════════════════════════════════
function HomePage({setPage}){
  const {user,data,claimDaily,canDaily}=useApp();
  const feed=useLiveFeed();
  const online=useRef(1247+Math.floor(Math.random()*600));
  const invItems=Object.values(data.inventory).slice(0,6);

  const modes=[
    {page:"cases",  icon:"🎰",label:"Cases",   color:"#a78bfa",desc:"Open prize cases"},
    {page:"crash",  icon:"🚀",label:"Crash",   color:"#ef4444",desc:"Ride the rocket"},
    {page:"wheel",  icon:"🎡",label:"Roulette",color:"#f59e0b",desc:"Red or black?"},
    {page:"upgrade",icon:"⚡",label:"Upgrade", color:"#22c55e",desc:"Level up gifts"},
  ];

  return(
    <div style={{padding:"14px 14px 16px",display:"flex",flexDirection:"column",gap:14,animation:"fadeUp 0.35s ease"}}>
      {/* Profile card */}
      <Card style={{padding:18}}>
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          <Ava user={user} size={56}/>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:16,fontWeight:800,fontFamily:"Syne,sans-serif",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{user.name}</div>
            <div style={{fontSize:11,color:"var(--muted)",marginBottom:6}}>{user.username||"Telegram User"}</div>
            <XpBar xp={data.xp} level={data.level}/>
          </div>
          <div style={{textAlign:"right",flexShrink:0}}>
            <div style={{fontSize:22,fontWeight:900,color:"var(--neon)",fontFamily:"Syne,sans-serif",lineHeight:1}}>{data.balance.toLocaleString()}</div>
            <div style={{fontSize:9,color:"var(--muted)",marginTop:2}}>⭐ Stars</div>
          </div>
        </div>
      </Card>

      {/* Stats */}
      <div style={{display:"flex",gap:8}}>
        <Pill label="Opened" value={data.totalSpins}/>
        <Pill label="Earned" value={`⭐${data.totalEarned.toLocaleString()}`} color="var(--green)"/>
        <Pill label="Online" value={online.current.toLocaleString()} color="var(--gold)"/>
      </div>

      {/* Daily */}
      <Card style={{padding:16,cursor:"pointer",border:canDaily?"1px solid var(--gold)44":"1px solid var(--border)",background:canDaily?"rgba(245,158,11,0.06)":"var(--card)"}} onClick={canDaily?claimDaily:undefined}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <span style={{fontSize:36,animation:"float 3s ease-in-out infinite"}}>🎁</span>
          <div style={{flex:1}}>
            <div style={{fontWeight:800,fontFamily:"Syne,sans-serif",fontSize:14}}>{canDaily?"Free Daily Case!":"Already claimed"}</div>
            <div style={{fontSize:11,color:"var(--muted)",marginTop:2}}>{canDaily?"Tap to claim your reward":"Come back tomorrow"}</div>
          </div>
          <Btn variant={canDaily?"gold":"ghost"} style={{padding:"8px 14px",fontSize:12,flexShrink:0}} onClick={canDaily?claimDaily:undefined} disabled={!canDaily}>
            {canDaily?"Claim":"✓"}
          </Btn>
        </div>
      </Card>

      {/* Modes */}
      <div>
        <div style={{fontSize:10,color:"var(--muted)",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:10,fontFamily:"Syne,sans-serif"}}>Game Modes</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          {modes.map(m=>(
            <Card key={m.page} onClick={()=>setPage(m.page)} style={{padding:16,cursor:"pointer"}}>
              <div style={{fontSize:30,marginBottom:6}}>{m.icon}</div>
              <div style={{fontWeight:800,fontFamily:"Syne,sans-serif",fontSize:14,color:m.color}}>{m.label}</div>
              <div style={{fontSize:10,color:"var(--muted)",marginTop:2}}>{m.desc}</div>
            </Card>
          ))}
        </div>
      </div>

      {/* Inventory preview */}
      {invItems.length>0&&(
        <div>
          <div style={{fontSize:10,color:"var(--muted)",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:10,fontFamily:"Syne,sans-serif",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span>Inventory</span>
            <span style={{color:"var(--neon)",cursor:"pointer"}} onClick={()=>setPage("upgrade")}>All →</span>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
            {invItems.map(item=>{
              const c=RARITY[item.rarity];
              return(
                <Card key={item.id} rarity={item.rarity} style={{padding:"10px 6px",textAlign:"center"}}>
                  <div style={{fontSize:22,marginBottom:3}}>{item.emoji}</div>
                  <div style={{fontSize:9,fontWeight:700,color:c.color}}>×{item.count}</div>
                  <div style={{fontSize:8,color:"var(--muted)",marginTop:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.name}</div>
                </Card>
              );
            })}
          </div>
        </div>
      )}

      {/* Live */}
      <div>
        <div style={{fontSize:10,color:"var(--muted)",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:10,fontFamily:"Syne,sans-serif",display:"flex",alignItems:"center",gap:6}}>
          <span style={{width:6,height:6,background:"var(--green)",borderRadius:"50%",display:"inline-block",animation:"live-dot 1.4s ease-in-out infinite"}}/>
          Live Wins
        </div>
        <LiveBar feed={feed}/>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════
// CASES (ROULETTE)
// ══════════════════════════════════════════════════════════
function CasesPage(){
  const {data,setData,notify,addItem}=useApp();
  const [sel,setSel]=useState(0);
  const [spinning,setSpinning]=useState(false);
  const [result,setResult]=useState(null);
  const [reelItems,setReelItems]=useState(()=>Array.from({length:40},(_,i)=>GIFTS[i%GIFTS.length]));
  const [stats,setStats]=useState({common:0,rare:0,epic:0,legendary:0,mythic:0});
  const trackRef=useRef(null);

  const doSpin=()=>{
    const cs=CASES[sel];
    if(data.balance<cs.price){notify("Not enough Stars! 💔","error");return;}
    if(spinning)return;
    setSpinning(true); setResult(null);
    setData(p=>({...p,balance:p.balance-cs.price}));
    const rarity=weightedRandom(cs.pool);
    const winner=randomGift(rarity);
    const winPos=34;
    const items=Array.from({length:44},(_,i)=>i===winPos?winner:GIFTS[Math.floor(Math.random()*GIFTS.length)]);
    setReelItems(items);
    setTimeout(()=>{
      if(!trackRef.current)return;
      const iw=90, center=150;
      const tx=-(winPos*iw-(center-iw/2));
      trackRef.current.style.transition="none";
      trackRef.current.style.transform="translateX(0px)";
      requestAnimationFrame(()=>requestAnimationFrame(()=>{
        trackRef.current.style.transition="transform 4.6s cubic-bezier(0.05,0.4,0.08,1)";
        trackRef.current.style.transform=`translateX(${tx}px)`;
      }));
    },30);
    setTimeout(()=>{
      setSpinning(false);
      setResult({...winner,rarity});
      setStats(p=>({...p,[rarity]:(p[rarity]||0)+1}));
      addItem(winner);
      const xpGain={mythic:100,legendary:50,epic:25,rare:10,common:5}[rarity]||5;
      setData(p=>({...p,totalSpins:p.totalSpins+1,xp:p.xp+xpGain,recentWins:[{...winner,rarity,at:Date.now()},...p.recentWins].slice(0,20)}));
    },4900);
  };

  const sell=()=>{
    if(!result)return;
    setData(p=>({...p,balance:p.balance+result.value,totalEarned:p.totalEarned+result.value}));
    notify(`Sold for ${result.value} ⭐ 💚`);
    setResult(null);
  };

  const cfg=result?RARITY[result.rarity]:null;

  return(
    <div style={{padding:"14px 14px 16px",display:"flex",flexDirection:"column",gap:14,animation:"fadeUp 0.35s ease"}}>
      <div style={{display:"flex",gap:8}}>
        <Pill label="Balance" value={`⭐ ${data.balance.toLocaleString()}`}/>
        <Pill label="Opened" value={data.totalSpins}/>
      </div>

      {/* Case picker */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
        {CASES.map((c,i)=>(
          <Card key={i} onClick={()=>setSel(i)} style={{padding:12,textAlign:"center",cursor:"pointer",border:sel===i?"1px solid var(--neon)":"1px solid var(--border)",background:sel===i?"rgba(167,139,250,0.08)":"var(--card)"}}>
            <div style={{fontSize:26,marginBottom:4}}>{c.icon}</div>
            <div style={{fontSize:11,fontWeight:700,fontFamily:"Syne,sans-serif"}}>{c.name}</div>
            <div style={{fontSize:11,color:"var(--neon)",marginTop:2,fontWeight:700}}>{c.price} ⭐</div>
          </Card>
        ))}
      </div>

      {/* Reel */}
      <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:18,padding:14,overflow:"hidden",position:"relative"}}>
        <div style={{position:"absolute",top:0,bottom:0,left:"50%",transform:"translateX(-50%)",width:2,background:"var(--neon)",zIndex:3,boxShadow:"0 0 10px var(--neon)"}}>
          <div style={{position:"absolute",top:0,left:"50%",transform:"translateX(-50%)",width:0,height:0,borderLeft:"6px solid transparent",borderRight:"6px solid transparent",borderTop:"9px solid var(--neon)"}}/>
          <div style={{position:"absolute",bottom:0,left:"50%",transform:"translateX(-50%)",width:0,height:0,borderLeft:"6px solid transparent",borderRight:"6px solid transparent",borderBottom:"9px solid var(--neon)"}}/>
        </div>
        <div style={{position:"absolute",top:0,left:0,width:56,height:"100%",background:"linear-gradient(to right,var(--card),transparent)",zIndex:2}}/>
        <div style={{position:"absolute",top:0,right:0,width:56,height:"100%",background:"linear-gradient(to left,var(--card),transparent)",zIndex:2}}/>
        <div style={{overflow:"hidden",height:96,borderRadius:10}}>
          <div ref={trackRef} style={{display:"flex",gap:6,width:"max-content",height:96,alignItems:"center"}}>
            {reelItems.map((g,i)=>{
              const rc=RARITY[g.rarity];
              return(
                <div key={i} style={{width:82,height:86,background:"#1a2238",border:`1px solid ${rc.color}30`,borderRadius:12,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2,flexShrink:0}}>
                  <span style={{fontSize:24}}>{g.emoji}</span>
                  <span style={{fontSize:8,color:"var(--muted)",textAlign:"center",padding:"0 3px",lineHeight:1.2}}>{g.name}</span>
                  <span style={{fontSize:7,fontWeight:700,color:rc.color}}>{rc.label}</span>
                </div>
              );
            })}
          </div>
        </div>
      </div>

      <Btn onClick={doSpin} disabled={spinning||data.balance<CASES[sel].price} style={{width:"100%",padding:15,fontSize:14,animation:!spinning?"pulse-glow 3s infinite":"none"}}>
        {spinning?"⏳ Opening...":` 🎰 Open ${CASES[sel].name} — ${CASES[sel].price} ⭐`}
      </Btn>

      {result&&(
        <div style={{animation:"fadeUp 0.4s ease"}}>
          <Card rarity={result.rarity} style={{padding:22,textAlign:"center",border:`2px solid ${cfg.color}44`}}>
            <div style={{fontSize:58,display:"block",marginBottom:8,animation:"pop 0.55s ease"}}>{result.emoji}</div>
            <div style={{fontSize:20,fontWeight:900,fontFamily:"Syne,sans-serif",marginBottom:6}}>{result.name}</div>
            <Badge rarity={result.rarity}/>
            <div style={{fontSize:12,color:"var(--muted)",marginTop:8,lineHeight:1.5}}>{result.desc}</div>
            <div style={{display:"flex",gap:8,marginTop:14}}>
              <Btn variant="success" style={{flex:1}} onClick={sell}>💚 Sell {result.value} ⭐</Btn>
              <Btn variant="ghost" style={{flex:1}} onClick={()=>setResult(null)}>Keep it</Btn>
            </div>
          </Card>
        </div>
      )}

      {/* Stats */}
      <div>
        <div style={{fontSize:10,color:"var(--muted)",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:10,fontFamily:"Syne,sans-serif"}}>Drop Stats</div>
        <div style={{display:"flex",gap:6}}>
          {Object.entries(stats).map(([r,v])=>(
            <Pill key={r} label={r.slice(0,3)} value={v} color={RARITY[r].color}/>
          ))}
        </div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════
// CRASH
// ══════════════════════════════════════════════════════════
function CrashPage(){
  const {data,setData,notify}=useApp();
  const [phase,setPhase]=useState("waiting");
  const [multi,setMulti]=useState(1.00);
  const [bet,setBet]=useState("100");
  const [autoVal,setAutoVal]=useState("2.00");
  const [cashedOut,setCashedOut]=useState(false);
  const [myBet,setMyBet]=useState(false);
  const [countdown,setCountdown]=useState(5);
  const [history,setHistory]=useState([2.45,1.12,8.33,15.5,1.03,3.21,0.99,4.56,12.1,2.87]);
  const [players,setPlayers]=useState([]);
  const [pathD,setPathD]=useState("M 0 140");
  const crashPt=useRef(1);
  const startT=useRef(0);
  const animR=useRef(null);
  const ptsRef=useRef([{x:0,y:140}]);
  const myBetRef=useRef(false);
  const cashedRef=useRef(false);
  const multiRef=useRef(1);

  useEffect(()=>{ genPlayers(); startCd(); return()=>cancelAnimationFrame(animR.current); },[]);

  function genPlayers(){
    setPlayers(Array.from({length:5},(_,i)=>({id:i,name:FNAMES[i%FNAMES.length],bet:Math.floor(100+Math.random()*900),cash:(1.3+Math.random()*4).toFixed(2)})));
  }

  function startCd(){
    let c=5; setCountdown(c); setPhase("waiting"); setMulti(1.00);
    setCashedOut(false); setMyBet(false); setPathD("M 0 140"); ptsRef.current=[{x:0,y:140}];
    myBetRef.current=false; cashedRef.current=false; multiRef.current=1;
    const iv=setInterval(()=>{ c--; setCountdown(c); if(c<=0){clearInterval(iv);startRound();} },1000);
  }

  function startRound(){
    const cp=Math.max(1.01,0.97/(1-Math.random()*0.92));
    crashPt.current=cp; startT.current=performance.now(); setPhase("running");
    const tick=now=>{
      const el=(now-startT.current)/1000;
      const m=Math.pow(Math.E,0.14*el);
      multiRef.current=m;
      if(m>=cp){
        const fm=parseFloat(cp.toFixed(2));
        setMulti(fm); setPhase("crashed");
        setHistory(p=>[fm,...p].slice(0,15));
        genPlayers();
        if(myBetRef.current&&!cashedRef.current){ notify(`Crashed at ${fm}x 💀`,"error"); myBetRef.current=false; setMyBet(false); }
        setTimeout(startCd,3200); return;
      }
      setMulti(parseFloat(m.toFixed(2)));
      if(myBetRef.current&&!cashedRef.current&&parseFloat(autoVal)<=m){ doCashout(m); return; }
      const W=280,H=140;
      const xp=Math.min(1,el/14)*W;
      const yp=H-Math.min(1,(m-1)/18)*H;
      ptsRef.current=[...ptsRef.current,{x:xp,y:yp}];
      setPathD("M "+ptsRef.current.map(p=>`${p.x.toFixed(1)} ${p.y.toFixed(1)}`).join(" L "));
      animR.current=requestAnimationFrame(tick);
    };
    animR.current=requestAnimationFrame(tick);
  }

  function placeBet(){
    const amt=parseInt(bet)||0;
    if(amt<10){notify("Min bet 10 ⭐","error");return;}
    if(amt>data.balance){notify("Not enough Stars!","error");return;}
    if(phase!=="waiting"){notify("Wait for next round","error");return;}
    setData(p=>({...p,balance:p.balance-amt}));
    setMyBet(true); myBetRef.current=true;
    notify(`Bet placed: ${amt} ⭐`);
  }

  function doCashout(curM){
    if(!myBetRef.current||cashedRef.current)return;
    cashedRef.current=true; setCashedOut(true); setMyBet(false); myBetRef.current=false;
    const amt=parseInt(bet)||0;
    const won=Math.floor(amt*(curM||multiRef.current));
    setData(p=>({...p,balance:p.balance+won,totalEarned:p.totalEarned+won-amt,xp:p.xp+20}));
    notify(`💰 Cashed out ${won} ⭐ at ${(curM||multiRef.current).toFixed(2)}x`);
  }

  const crashed=phase==="crashed";
  const mc=multi>=2?"#22c55e":multi>=1.5?"#f59e0b":"#ef4444";
  const betAmt=parseInt(bet)||0;

  return(
    <div style={{padding:"14px 14px 16px",display:"flex",flexDirection:"column",gap:12,animation:"fadeUp 0.35s ease"}}>
      {/* History */}
      <div style={{display:"flex",gap:6,overflowX:"auto",scrollbarWidth:"none"}}>
        {history.map((h,i)=>{
          const c=h>=2?"#22c55e":h>=1.5?"#f59e0b":"#ef4444";
          return <div key={i} style={{background:`${c}18`,border:`1px solid ${c}44`,borderRadius:8,padding:"3px 8px",fontSize:11,fontWeight:700,color:c,flexShrink:0,fontFamily:"Syne,sans-serif"}}>{h.toFixed(2)}x</div>;
        })}
      </div>

      {/* Chart */}
      <Card style={{padding:16,minHeight:190,position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:12,left:0,right:0,display:"flex",justifyContent:"center",zIndex:2}}>
          <div style={{fontSize:52,fontWeight:900,fontFamily:"Syne,sans-serif",color:crashed?"#ef4444":mc,textShadow:`0 0 40px ${crashed?"#ef4444":mc}`,transition:"color 0.15s",letterSpacing:"-0.02em"}}>
            {crashed?"CRASH!":phase==="waiting"?`${countdown}s`:multi.toFixed(2)+"x"}
          </div>
        </div>
        {phase==="waiting"&&(
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:150,flexDirection:"column",gap:8}}>
            <span style={{fontSize:56,animation:"float 2s ease-in-out infinite",display:"block",marginTop:20}}>🚀</span>
            <div style={{fontSize:13,color:"var(--muted)",fontFamily:"Syne,sans-serif"}}>Next round in <span style={{color:"var(--neon)",fontWeight:800}}>{countdown}s</span></div>
          </div>
        )}
        {phase!=="waiting"&&(
          <svg viewBox="0 0 280 140" style={{width:"100%",height:140,marginTop:50}}>
            <defs>
              <linearGradient id="cg" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0%" stopColor={mc} stopOpacity="0.1"/>
                <stop offset="100%" stopColor={mc} stopOpacity="0.7"/>
              </linearGradient>
            </defs>
            <path d={pathD} stroke={mc} strokeWidth={2.5} fill="none" style={{filter:`drop-shadow(0 0 5px ${mc})`}}/>
          </svg>
        )}
      </Card>

      {/* Controls */}
      <Card style={{padding:14}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
          <div>
            <div style={{fontSize:9,color:"var(--muted)",marginBottom:4,textTransform:"uppercase",letterSpacing:"0.06em"}}>Bet (⭐)</div>
            <input value={bet} onChange={e=>setBet(e.target.value.replace(/\D/g,""))} style={{width:"100%",background:"var(--bg)",border:"1px solid var(--border)",borderRadius:10,padding:"10px 12px",color:"var(--text)",fontSize:15,fontFamily:"Syne,sans-serif",fontWeight:700}}/>
          </div>
          <div>
            <div style={{fontSize:9,color:"var(--muted)",marginBottom:4,textTransform:"uppercase",letterSpacing:"0.06em"}}>Auto Cashout</div>
            <input value={autoVal} onChange={e=>setAutoVal(e.target.value)} style={{width:"100%",background:"var(--bg)",border:"1px solid var(--border)",borderRadius:10,padding:"10px 12px",color:"var(--text)",fontSize:15,fontFamily:"Syne,sans-serif",fontWeight:700}}/>
          </div>
        </div>
        <div style={{display:"flex",gap:6,marginBottom:10}}>
          {["½","×2","Max"].map((l,i)=>(
            <Btn key={l} variant="ghost" style={{flex:1,padding:"9px 4px",fontSize:12}} onClick={()=>{
              if(i===0)setBet(b=>String(Math.max(10,Math.floor((parseInt(b)||10)/2))));
              if(i===1)setBet(b=>String(Math.min(data.balance,(parseInt(b)||10)*2)));
              if(i===2)setBet(String(data.balance));
            }}>{l}</Btn>
          ))}
        </div>
        {myBet&&phase==="running"?(
          <Btn variant="success" style={{width:"100%",padding:14,fontSize:14,animation:"pulse-glow 0.9s infinite"}} onClick={()=>doCashout()}>
            💰 Cash Out {Math.floor(betAmt*multi).toLocaleString()} ⭐
          </Btn>
        ):(
          <Btn style={{width:"100%",padding:14,fontSize:14}} onClick={placeBet} disabled={phase!=="waiting"||myBet}>
            {myBet?"✓ Bet Active":"🚀 Place Bet"}
          </Btn>
        )}
      </Card>

      {/* Players */}
      <div>
        <div style={{fontSize:10,color:"var(--muted)",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:10,fontFamily:"Syne,sans-serif"}}>Live Players</div>
        <Card style={{overflow:"hidden"}}>
          {players.map((p,i)=>(
            <div key={p.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",borderBottom:i<players.length-1?"1px solid var(--border)":"none"}}>
              <div style={{width:28,height:28,borderRadius:"50%",background:`hsl(${p.id*70},55%,45%)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,fontFamily:"Syne,sans-serif",flexShrink:0}}>{p.name.charAt(0)}</div>
              <div style={{flex:1,fontSize:12,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.name}</div>
              <div style={{fontSize:11,color:"var(--neon)",flexShrink:0}}>⭐ {p.bet}</div>
              <div style={{fontSize:11,color:"var(--green)",fontWeight:700,flexShrink:0}}>@{p.cash}x</div>
            </div>
          ))}
        </Card>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════
// ROULETTE WHEEL
// ══════════════════════════════════════════════════════════
function WheelPage(){
  const {data,setData,notify}=useApp();
  const [bets,setBets]=useState({red:0,black:0,green:0});
  const [spinning,setSpinning]=useState(false);
  const [result,setResult]=useState(null);
  const [history,setHistory]=useState([]);
  const [selColor,setSelColor]=useState("red");
  const [betAmt,setBetAmt]=useState("50");
  const [wheelDeg,setWheelDeg]=useState(0);
  const colorOf=n=>n===0?"green":n%2===0?"black":"red";
  const NUMS=[0,32,15,19,4,21,2,25,17,34,6,27,13,36,11,30,8,23,10,5,24,16,33,1,20,14,31,9,22,18,29,7,28,12,35,3,26];

  const placeBet=()=>{
    const amt=parseInt(betAmt)||0;
    if(amt<5){notify("Min bet 5 ⭐","error");return;}
    if(amt>data.balance){notify("Not enough Stars!","error");return;}
    if(spinning)return;
    setData(p=>({...p,balance:p.balance-amt}));
    setBets(p=>({...p,[selColor]:p[selColor]+amt}));
    notify(`+${amt} ⭐ on ${selColor}`);
  };

  const spin=()=>{
    if(spinning)return;
    const total=bets.red+bets.black+bets.green;
    if(!total){notify("Place a bet first!","error");return;}
    setSpinning(true); setResult(null);
    const winNum=NUMS[Math.floor(Math.random()*NUMS.length)];
    const winColor=colorOf(winNum);
    const target=wheelDeg+1800+Math.floor(Math.random()*360);
    setWheelDeg(target);
    setTimeout(()=>{
      setSpinning(false);
      setResult({num:winNum,color:winColor});
      setHistory(p=>[{num:winNum,color:winColor},...p].slice(0,22));
      let won=0;
      if(winColor==="green"&&bets.green>0)won=bets.green*14;
      else if(winColor==="red"&&bets.red>0)won=bets.red*2;
      else if(winColor==="black"&&bets.black>0)won=bets.black*2;
      const myBet=bets[winColor]||0;
      if(won>0){
        setData(p=>({...p,balance:p.balance+won,totalEarned:p.totalEarned+won-myBet,xp:p.xp+15,rouletteHistory:[{num:winNum,color:winColor,won:true},...p.rouletteHistory].slice(0,60)}));
        notify(`🎉 Won ${won} ⭐! ${winColor} ${winNum}`);
      }else{
        setData(p=>({...p,xp:p.xp+5,rouletteHistory:[{num:winNum,color:winColor,won:false},...p.rouletteHistory].slice(0,60)}));
        notify(`${winColor==="green"?"🟢":winColor==="red"?"🔴":"⚫"} ${winNum} — You lost`,"error");
      }
      setBets({red:0,black:0,green:0});
    },4600);
  };

  const total=bets.red+bets.black+bets.green;
  const CC={red:{color:"#ef4444",label:"Red",mult:"×2"},black:{color:"#475569",label:"Black",mult:"×2"},green:{color:"#22c55e",label:"Zero",mult:"×14"}};

  return(
    <div style={{padding:"14px 14px 16px",display:"flex",flexDirection:"column",gap:12,animation:"fadeUp 0.35s ease"}}>
      {/* History dots */}
      <div style={{display:"flex",gap:5,overflowX:"auto",scrollbarWidth:"none"}}>
        {history.map((h,i)=>(
          <div key={i} style={{width:26,height:26,borderRadius:"50%",background:h.color==="green"?"#22c55e":h.color==="red"?"#ef4444":"#374151",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:800,color:"#fff",flexShrink:0,fontFamily:"Syne,sans-serif"}}>{h.num}</div>
        ))}
        {!history.length&&<div style={{fontSize:11,color:"var(--muted)"}}>No history yet</div>}
      </div>

      {/* Wheel */}
      <Card style={{padding:24,display:"flex",flexDirection:"column",alignItems:"center",gap:16}}>
        <div style={{position:"relative",width:180,height:180}}>
          <div style={{position:"absolute",top:-10,left:"50%",transform:"translateX(-50%)",width:0,height:0,borderLeft:"8px solid transparent",borderRight:"8px solid transparent",borderTop:"14px solid var(--neon)",filter:"drop-shadow(0 0 6px var(--neon))",zIndex:2}}/>
          <div style={{width:180,height:180,borderRadius:"50%",border:"4px solid var(--neon)",background:"conic-gradient(from 0deg, #ef4444 0% 48.6%, #374151 48.6% 97.3%, #22c55e 97.3% 100%)",transition:spinning?"transform 4.6s cubic-bezier(0.17,0.67,0.12,0.99)":"none",transform:`rotate(${wheelDeg}deg)`,boxShadow:"0 0 36px rgba(167,139,250,0.25)"}}>
            <div style={{position:"absolute",inset:"18%",borderRadius:"50%",background:"var(--card)",border:"3px solid var(--border)",display:"flex",alignItems:"center",justifyContent:"center"}}>
              <span style={{fontSize:22,animation:spinning?"spin 0.5s linear infinite":"none"}}>🎡</span>
            </div>
          </div>
        </div>
        {result&&<div style={{fontSize:24,fontWeight:900,fontFamily:"Syne,sans-serif",color:result.color==="red"?"#ef4444":result.color==="green"?"#22c55e":"#94a3b8",animation:"pop 0.5s ease"}}>{result.color==="green"?"🟢":result.color==="red"?"🔴":"⚫"} {result.num}</div>}
        {spinning&&<div style={{fontSize:13,color:"var(--neon)",fontFamily:"Syne,sans-serif"}}>Spinning...</div>}
      </Card>

      {/* Color pick */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
        {Object.entries(CC).map(([c,cfg])=>(
          <div key={c} onClick={()=>setSelColor(c)} style={{border:`2px solid ${selColor===c?cfg.color:"var(--border)"}`,background:selColor===c?`${cfg.color}18`:"var(--card2)",borderRadius:13,padding:"10px 6px",textAlign:"center",cursor:"pointer",transition:"all 0.15s"}}>
            <div style={{width:18,height:18,borderRadius:"50%",background:cfg.color,margin:"0 auto 5px",border:"2px solid rgba(255,255,255,0.2)"}}/>
            <div style={{fontSize:10,fontWeight:700,color:selColor===c?cfg.color:"var(--muted)",fontFamily:"Syne,sans-serif"}}>{cfg.mult}</div>
            {bets[c]>0&&<div style={{fontSize:8,color:cfg.color,marginTop:2}}>⭐{bets[c]}</div>}
          </div>
        ))}
      </div>

      {/* Bet input */}
      <Card style={{padding:14}}>
        <div style={{display:"flex",gap:6,marginBottom:10}}>
          <input value={betAmt} onChange={e=>setBetAmt(e.target.value.replace(/\D/g,""))} style={{flex:1,background:"var(--bg)",border:"1px solid var(--border)",borderRadius:10,padding:"10px 12px",color:"var(--text)",fontSize:15,fontFamily:"Syne,sans-serif",fontWeight:700}}/>
          {["50","100","250"].map(v=>(
            <Btn key={v} variant="ghost" style={{padding:"10px 10px",fontSize:11}} onClick={()=>setBetAmt(v)}>{v}</Btn>
          ))}
        </div>
        <div style={{display:"flex",gap:8}}>
          <Btn onClick={placeBet} disabled={spinning} style={{flex:1}}>🎯 Bet {selColor}</Btn>
          <Btn variant="success" onClick={spin} disabled={spinning||!total} style={{flex:1}}>🎡 {spinning?"Spinning...":"Spin!"}</Btn>
        </div>
      </Card>
    </div>
  );
}

// ══════════════════════════════════════════════════════════
// UPGRADE
// ══════════════════════════════════════════════════════════
function UpgradePage(){
  const {data,setData,notify,addItem,removeItem}=useApp();
  const [src,setSrc]=useState(null);
  const [tgt,setTgt]=useState(null);
  const [upgrading,setUpgrading]=useState(false);
  const [upgradeRes,setUpgradeRes]=useState(null);
  const invItems=Object.values(data.inventory).filter(i=>i.count>0);
  const targets=GIFTS.filter(g=>!src||g.value>src.value).sort((a,b)=>a.value-b.value);
  const chance=src&&tgt?Math.max(5,Math.min(90,Math.floor(src.value/tgt.value*100))):null;

  const doUpgrade=()=>{
    if(!src||!tgt){notify("Select both items!","error");return;}
    if(!data.inventory[src.id]||data.inventory[src.id].count<1){notify("Not in inventory!","error");return;}
    setUpgrading(true); setUpgradeRes(null);
    setTimeout(()=>{
      const ok=Math.random()*100<chance;
      removeItem(src.id);
      setData(p=>({...p,upgradeStats:{attempts:p.upgradeStats.attempts+1,successes:p.upgradeStats.successes+(ok?1:0)},xp:p.xp+(ok?40:10)}));
      if(ok){addItem(tgt);notify(`⚡ Upgraded to ${tgt.name}!`);}
      else notify("❌ Upgrade failed...","error");
      setUpgradeRes(ok?"success":"fail");
      setUpgrading(false);
    },2600);
  };

  const rarityOrd=["common","rare","epic","legendary","mythic"];

  return(
    <div style={{padding:"14px 14px 16px",display:"flex",flexDirection:"column",gap:14,animation:"fadeUp 0.35s ease"}}>
      <div style={{display:"flex",gap:8}}>
        <Pill label="Attempts" value={data.upgradeStats.attempts}/>
        <Pill label="Successes" value={data.upgradeStats.successes} color="var(--green)"/>
        <Pill label="Win Rate" value={data.upgradeStats.attempts>0?`${Math.round(data.upgradeStats.successes/data.upgradeStats.attempts*100)}%`:"–"} color="var(--gold)"/>
      </div>

      {/* Arena */}
      <Card style={{padding:18}}>
        <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:14}}>
          {/* Source */}
          <div style={{flex:1,textAlign:"center"}}>
            <div style={{fontSize:9,color:"var(--muted)",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.06em"}}>Your Item</div>
            <div style={{border:`2px dashed ${src?RARITY[src.rarity].color:"var(--border)"}`,borderRadius:14,padding:14,minHeight:100,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:4,background:src?RARITY[src.rarity].bg:"var(--bg)",transition:"all 0.3s"}}>
              {src?(<>
                <div style={{fontSize:34,animation:upgrading?"spin 1s linear infinite":"none"}}>{src.emoji}</div>
                <div style={{fontSize:10,fontWeight:700,fontFamily:"Syne,sans-serif"}}>{src.name}</div>
                <Badge rarity={src.rarity}/>
              </>):<div style={{fontSize:26,color:"var(--muted)"}}>➕</div>}
            </div>
          </div>
          {/* Middle */}
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,flexShrink:0}}>
            <span style={{fontSize:18}}>⚡</span>
            {chance!==null&&<span style={{fontSize:14,fontWeight:900,fontFamily:"Syne,sans-serif",color:chance>50?"var(--green)":chance>25?"var(--gold)":"var(--red)"}}>{chance}%</span>}
            <span style={{fontSize:16,color:"var(--muted)"}}>→</span>
          </div>
          {/* Target */}
          <div style={{flex:1,textAlign:"center"}}>
            <div style={{fontSize:9,color:"var(--muted)",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.06em"}}>Target</div>
            <div style={{border:`2px dashed ${tgt?RARITY[tgt.rarity].color:"var(--border)"}`,borderRadius:14,padding:14,minHeight:100,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:4,background:tgt?RARITY[tgt.rarity].bg:"var(--bg)",transition:"all 0.3s"}}>
              {tgt?(<>
                <div style={{fontSize:34}}>{tgt.emoji}</div>
                <div style={{fontSize:10,fontWeight:700,fontFamily:"Syne,sans-serif"}}>{tgt.name}</div>
                <Badge rarity={tgt.rarity}/>
              </>):<div style={{fontSize:26,color:"var(--muted)"}}>➕</div>}
            </div>
          </div>
        </div>

        {upgradeRes&&(
          <div style={{textAlign:"center",padding:14,background:upgradeRes==="success"?"rgba(34,197,94,0.1)":"rgba(239,68,68,0.1)",borderRadius:12,marginBottom:12,animation:"pop 0.5s ease",border:`1px solid ${upgradeRes==="success"?"#22c55e44":"#ef444444"}`}}>
            <div style={{fontSize:28,marginBottom:4}}>{upgradeRes==="success"?"🎉":"💔"}</div>
            <div style={{fontWeight:800,fontFamily:"Syne,sans-serif",color:upgradeRes==="success"?"var(--green)":"var(--red)"}}>{upgradeRes==="success"?`Upgraded to ${tgt?.name}!`:"Upgrade Failed"}</div>
          </div>
        )}

        <Btn onClick={doUpgrade} disabled={upgrading||!src||!tgt} style={{width:"100%",padding:14,fontSize:13,animation:src&&tgt&&!upgrading?"pulse-glow 3s infinite":"none"}}>
          {upgrading?"⚡ Upgrading...":src&&tgt?`⚡ Upgrade (${chance}% chance)`:"Select items"}
        </Btn>
      </Card>

      {/* Source inventory */}
      {invItems.length>0&&(
        <div>
          <div style={{fontSize:10,color:"var(--muted)",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:10,fontFamily:"Syne,sans-serif"}}>Select Source</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
            {invItems.sort((a,b)=>rarityOrd.indexOf(a.rarity)-rarityOrd.indexOf(b.rarity)).map(item=>{
              const c=RARITY[item.rarity];
              const sel=src?.id===item.id;
              return(
                <Card key={item.id} onClick={()=>setSrc(sel?null:item)} rarity={item.rarity} style={{padding:"10px 6px",textAlign:"center",cursor:"pointer",border:sel?`2px solid ${c.color}`:"1px solid var(--border)",background:sel?c.bg:"var(--card)"}}>
                  <div style={{fontSize:22,marginBottom:3}}>{item.emoji}</div>
                  <div style={{fontSize:9,fontWeight:700,color:c.color}}>×{item.count}</div>
                  <div style={{fontSize:8,color:"var(--muted)",marginTop:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.name}</div>
                </Card>
              );
            })}
          </div>
        </div>
      )}

      {/* Target */}
      {src&&(
        <div>
          <div style={{fontSize:10,color:"var(--muted)",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:10,fontFamily:"Syne,sans-serif"}}>Select Target</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
            {targets.map(item=>{
              const c=RARITY[item.rarity];
              const sel=tgt?.id===item.id;
              const r=Math.max(5,Math.min(90,Math.floor(src.value/item.value*100)));
              return(
                <Card key={item.id} onClick={()=>setTgt(sel?null:item)} rarity={item.rarity} style={{padding:"10px 6px",textAlign:"center",cursor:"pointer",border:sel?`2px solid ${c.color}`:"1px solid var(--border)",background:sel?c.bg:"var(--card)"}}>
                  <div style={{fontSize:22,marginBottom:3}}>{item.emoji}</div>
                  <div style={{fontSize:9,fontWeight:700,color:r>50?"var(--green)":r>25?"var(--gold)":"var(--red)"}}>{r}%</div>
                  <div style={{fontSize:8,color:"var(--muted)",marginTop:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.name}</div>
                </Card>
              );
            })}
          </div>
        </div>
      )}

      {invItems.length===0&&(
        <div style={{textAlign:"center",padding:40,color:"var(--muted)"}}>
          <div style={{fontSize:48,marginBottom:12}}>📦</div>
          <div style={{fontFamily:"Syne,sans-serif",fontWeight:700}}>No items yet</div>
          <div style={{fontSize:12,marginTop:6}}>Open some cases first!</div>
        </div>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════════════
// PROFILE
// ══════════════════════════════════════════════════════════
function ProfilePage(){
  const {user,data,setData,sound,setSound,notify}=useApp();
  return(
    <div style={{padding:"14px 14px 16px",display:"flex",flexDirection:"column",gap:14,animation:"fadeUp 0.35s ease"}}>
      <Card style={{padding:22,display:"flex",flexDirection:"column",alignItems:"center",gap:12}}>
        <Ava user={user} size={72}/>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:18,fontWeight:900,fontFamily:"Syne,sans-serif"}}>{user.name}</div>
          <div style={{fontSize:12,color:"var(--muted)",marginBottom:8}}>{user.username}</div>
          <span style={{background:"rgba(167,139,250,0.12)",color:"var(--neon)",border:"1px solid rgba(167,139,250,0.3)",borderRadius:99,fontSize:10,fontWeight:700,padding:"3px 12px",fontFamily:"Syne,sans-serif"}}>LV {data.level} Player</span>
        </div>
        <div style={{width:"100%"}}><XpBar xp={data.xp} level={data.level}/></div>
      </Card>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <Pill label="Balance" value={`⭐ ${data.balance.toLocaleString()}`}/>
        <Pill label="Earned" value={`⭐ ${data.totalEarned.toLocaleString()}`} color="var(--green)"/>
        <Pill label="Cases" value={data.totalSpins} color="var(--gold)"/>
        <Pill label="XP" value={data.xp.toLocaleString()} color="var(--pink)"/>
      </div>

      <Card style={{padding:16}}>
        <div style={{fontWeight:800,fontFamily:"Syne,sans-serif",marginBottom:14,fontSize:14}}>Settings</div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
          <span style={{fontSize:13}}>🔊 Sound</span>
          <div onClick={()=>setSound(!sound)} style={{width:42,height:23,borderRadius:99,background:sound?"var(--accent)":"var(--border)",position:"relative",cursor:"pointer",transition:"background 0.2s"}}>
            <div style={{width:19,height:19,borderRadius:"50%",background:"#fff",position:"absolute",top:2,left:sound?21:2,transition:"left 0.2s"}}/>
          </div>
        </div>
        <Btn variant="danger" onClick={()=>{if(confirm("Reset all progress?")){{setData(defaultData());notify("Progress reset!")}}}} style={{width:"100%",fontSize:12}}>🗑️ Reset Progress</Btn>
      </Card>

      <Card style={{padding:16}}>
        <div style={{fontWeight:800,fontFamily:"Syne,sans-serif",marginBottom:12,fontSize:14}}>Upgrade Stats</div>
        <div style={{display:"flex",gap:8}}>
          <Pill label="Attempts" value={data.upgradeStats.attempts}/>
          <Pill label="Wins" value={data.upgradeStats.successes} color="var(--green)"/>
          <Pill label="Rate" value={data.upgradeStats.attempts>0?`${Math.round(data.upgradeStats.successes/data.upgradeStats.attempts*100)}%`:"–"} color="var(--gold)"/>
        </div>
      </Card>

      {data.rouletteHistory.length>0&&(
        <Card style={{padding:16}}>
          <div style={{fontWeight:800,fontFamily:"Syne,sans-serif",marginBottom:12,fontSize:14}}>Roulette History</div>
          <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
            {data.rouletteHistory.slice(0,24).map((h,i)=>(
              <div key={i} style={{width:25,height:25,borderRadius:"50%",background:h.color==="green"?"#22c55e":h.color==="red"?"#ef4444":"#374151",display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,fontWeight:800,color:"#fff",border:h.won?"2px solid var(--gold)":"none"}}>{h.num}</div>
            ))}
          </div>
        </Card>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════════════
// NOTIFICATION TOAST
// ══════════════════════════════════════════════════════════
function Toast(){
  const {notif}=useApp();
  if(!notif)return null;
  const colors={success:"#22c55e",error:"#ef4444",info:"#a78bfa"};
  const c=colors[notif.type]||colors.info;
  return(
    <div key={notif.id} style={{position:"fixed",top:18,right:14,zIndex:9999,background:c,color:"#fff",padding:"10px 16px",borderRadius:99,fontSize:12,fontWeight:700,fontFamily:"Syne,sans-serif",animation:"notif 3s ease forwards",boxShadow:`0 4px 20px ${c}66`,maxWidth:"82vw",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
      {notif.msg}
    </div>
  );
}

// ══════════════════════════════════════════════════════════
// NAV + LAYOUT
// ══════════════════════════════════════════════════════════
const NAV=[
  {page:"home",   icon:"🏠",label:"Home"},
  {page:"cases",  icon:"🎰",label:"Cases"},
  {page:"crash",  icon:"🚀",label:"Crash"},
  {page:"wheel",  icon:"🎡",label:"Wheel"},
  {page:"upgrade",icon:"⚡",label:"Upgrade"},
  {page:"profile",icon:"👤",label:"Profile"},
];

function App(){
  const [page,setPage]=useState("home");
  const {data}=useApp();
  const PAGE_MAP={home:HomePage,cases:CasesPage,crash:CrashPage,wheel:WheelPage,upgrade:UpgradePage,profile:ProfilePage};
  const PageComp=PAGE_MAP[page]||HomePage;
  const titles={home:"🎰 TonCasino",cases:"🎰 Cases",crash:"🚀 Crash",wheel:"🎡 Roulette",upgrade:"⚡ Upgrade",profile:"👤 Profile"};

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%",background:"var(--bg)"}}>
      {/* Top bar */}
      <div style={{background:"var(--surface)",borderBottom:"1px solid var(--border)",padding:"11px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0,position:"sticky",top:0,zIndex:40}}>
        <div style={{fontSize:14,fontWeight:900,fontFamily:"Syne,sans-serif"}}>{titles[page]}</div>
        <div style={{display:"flex",alignItems:"center",gap:6,background:"var(--card)",border:"1px solid var(--border)",borderRadius:99,padding:"5px 12px"}}>
          <span style={{fontSize:12}}>⭐</span>
          <span style={{fontSize:13,fontWeight:800,fontFamily:"Syne,sans-serif",color:"var(--neon)"}}>{data.balance.toLocaleString()}</span>
        </div>
      </div>

      {/* Page */}
      <div style={{flex:1,overflowY:"auto",paddingBottom:68}} key={page}>
        <PageComp setPage={setPage}/>
      </div>

      {/* Bottom nav */}
      <div style={{position:"fixed",bottom:0,left:0,right:0,background:"var(--surface)",borderTop:"1px solid var(--border)",display:"flex",zIndex:50,paddingBottom:"env(safe-area-inset-bottom,0px)"}}>
        {NAV.map(item=>{
          const act=page===item.page;
          return(
            <div key={item.page} onClick={()=>setPage(item.page)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",padding:"7px 2px 9px",cursor:"pointer",color:act?"var(--neon)":"var(--muted)",borderTop:act?"2px solid var(--neon)":"2px solid transparent",transition:"color 0.15s,border-color 0.15s"}}>
              <span style={{fontSize:16}}>{item.icon}</span>
              <span style={{fontSize:8,marginTop:2,fontWeight:act?700:500,fontFamily:"Syne,sans-serif",letterSpacing:"0.02em"}}>{item.label}</span>
            </div>
          );
        })}
      </div>

      <Toast/>
    </div>
  );
}

// ══════════════════════════════════════════════════════════
// ROOT
// ══════════════════════════════════════════════════════════
function Root(){
  return(
    <AppProvider>
      <App/>
    </AppProvider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
