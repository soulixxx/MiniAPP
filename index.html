<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My SoundCloud Likes</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Анимированный фон */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: radial-gradient(ellipse at 20% 50%, #ff550022 0%, transparent 60%),
                  radial-gradient(ellipse at 80% 20%, #ff330015 0%, transparent 50%),
                  radial-gradient(ellipse at 60% 80%, #ff550010 0%, transparent 50%);
      animation: pulse 6s ease-in-out infinite alternate;
    }

    @keyframes pulse {
      0% { opacity: 0.6; }
      100% { opacity: 1; }
    }

    /* Плавающие круги */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      animation: float 8s ease-in-out infinite;
      z-index: 0;
    }
    .blob1 { width: 300px; height: 300px; background: #FF5500; top: -100px; left: -100px; animation-delay: 0s; }
    .blob2 { width: 200px; height: 200px; background: #ff3300; bottom: 100px; right: -50px; animation-delay: 3s; }
    .blob3 { width: 150px; height: 150px; background: #ff7700; top: 50%; left: 50%; animation-delay: 1.5s; }

    @keyframes float {
      0%, 100% { transform: translateY(0px) scale(1); }
      50% { transform: translateY(-30px) scale(1.05); }
    }

    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px 40px;
      min-height: 100vh;
    }

    /* Логотип */
    .logo-wrap {
      position: relative;
      margin-bottom: 24px;
    }
    .logo-ring {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      border: 2px solid #FF5500;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: spin-ring 4s linear infinite;
      box-shadow: 0 0 30px #FF550055, inset 0 0 20px #FF550011;
    }
    @keyframes spin-ring {
      0% { box-shadow: 0 0 20px #FF550055, inset 0 0 20px #FF550011; }
      50% { box-shadow: 0 0 50px #FF5500aa, inset 0 0 30px #FF550033; }
      100% { box-shadow: 0 0 20px #FF550055, inset 0 0 20px #FF550011; }
    }
    .logo-icon {
      font-size: 40px;
      animation: bounce-icon 2s ease-in-out infinite;
    }
    @keyframes bounce-icon {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }

    h1 {
      font-size: 28px;
      font-weight: 800;
      text-align: center;
      margin-bottom: 6px;
      background: linear-gradient(135deg, #fff 0%, #FF5500 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: 14px;
      color: #888;
      text-align: center;
      margin-bottom: 36px;
    }

    /* Карточки статистики */
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      width: 100%;
      max-width: 360px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: #ffffff08;
      border: 1px solid #ffffff10;
      border-radius: 16px;
      padding: 16px 8px;
      text-align: center;
      backdrop-filter: blur(10px);
      transition: transform 0.2s, border-color 0.2s;
    }
    .stat-card:active { transform: scale(0.95); }
    .stat-card:hover { border-color: #FF550033; }
    .stat-num {
      font-size: 22px;
      font-weight: 800;
      color: #FF5500;
      display: block;
    }
    .stat-label {
      font-size: 10px;
      color: #666;
      margin-top: 2px;
      display: block;
    }

    /* Визуализация звука */
    .equalizer {
      display: flex;
      align-items: flex-end;
      gap: 4px;
      height: 40px;
      margin-bottom: 32px;
    }
    .bar {
      width: 4px;
      background: #FF5500;
      border-radius: 2px;
      animation: eq-bounce 0.8s ease-in-out infinite alternate;
      opacity: 0.8;
    }
    .bar:nth-child(1) { animation-delay: 0s; }
    .bar:nth-child(2) { animation-delay: 0.1s; }
    .bar:nth-child(3) { animation-delay: 0.2s; }
    .bar:nth-child(4) { animation-delay: 0.05s; }
    .bar:nth-child(5) { animation-delay: 0.3s; }
    .bar:nth-child(6) { animation-delay: 0.15s; }
    .bar:nth-child(7) { animation-delay: 0.25s; }
    .bar:nth-child(8) { animation-delay: 0.08s; }
    .bar:nth-child(9) { animation-delay: 0.18s; }
    .bar:nth-child(10) { animation-delay: 0.35s; }

    @keyframes eq-bounce {
      0% { height: 4px; }
      100% { height: 36px; }
    }

    /* Главная кнопка */
    .btn-main {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #FF5500;
      color: #fff;
      text-decoration: none;
      padding: 18px 40px;
      border-radius: 50px;
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 16px;
      width: 100%;
      max-width: 320px;
      justify-content: center;
      box-shadow: 0 8px 32px #FF550044;
      transition: transform 0.15s, box-shadow 0.15s;
      position: relative;
      overflow: hidden;
    }
    .btn-main::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #ffffff20, transparent);
    }
    .btn-main:active {
      transform: scale(0.97);
      box-shadow: 0 4px 16px #FF550033;
    }

    .btn-secondary {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #ffffff08;
      color: #ccc;
      text-decoration: none;
      padding: 14px 32px;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 600;
      border: 1px solid #ffffff15;
      width: 100%;
      max-width: 320px;
      justify-content: center;
      transition: transform 0.15s, background 0.2s;
      margin-bottom: 40px;
    }
    .btn-secondary:active {
      transform: scale(0.97);
      background: #ffffff15;
    }

    /* Нижняя надпись */
    .footer {
      font-size: 12px;
      color: #444;
      text-align: center;
      margin-top: auto;
    }
    .footer span { color: #FF5500; }

    /* Появление */
    .content > * {
      animation: fade-up 0.5s ease both;
    }
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .logo-wrap { animation-delay: 0s; }
    h1 { animation-delay: 0.1s; }
    .subtitle { animation-delay: 0.15s; }
    .stats { animation-delay: 0.2s; }
    .equalizer { animation-delay: 0.25s; }
    .btn-main { animation-delay: 0.3s; }
    .btn-secondary { animation-delay: 0.35s; }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <div class="blob blob3"></div>

  <div class="content">
    <div class="logo-wrap">
      <div class="logo-ring">
        <div class="logo-icon">🎧</div>
      </div>
    </div>

    <h1>Мои лайки</h1>
    <p class="subtitle">Твоя музыкальная коллекция</p>

    <div class="stats">
      <div class="stat-card">
        <span class="stat-num">∞</span>
        <span class="stat-label">Лайков</span>
      </div>
      <div class="stat-card">
        <span class="stat-num">🔥</span>
        <span class="stat-label">Вайб</span>
      </div>
      <div class="stat-card">
        <span class="stat-num">24/7</span>
        <span class="stat-label">Музыка</span>
      </div>
    </div>

    <div class="equalizer">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
    </div>

    <a class="btn-main" href="https://soundcloud.com/you/likes" target="_blank">
      🎵 Открыть лайки
    </a>

    <a class="btn-secondary" href="https://soundcloud.com/discover" target="_blank">
      🔍 Слушать новое
    </a>

    <p class="footer">Сделано с <span>♥</span> для SoundCloud</p>
  </div>

  <script>
    Telegram.WebApp.ready();
    Telegram.WebApp.expand();
  </script>
</body>
</html>
