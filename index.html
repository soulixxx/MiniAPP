<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Plush PEPE Case</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@700;900&display=swap');

  :root {
    --green: #00c853;
    --green-dark: #007e33;
    --green-neon: #39ff14;
    --yellow: #ffd600;
    --orange: #ff6d00;
    --bg: #0a1a0a;
    --bg2: #0f2d0f;
    --card: #122912;
    --text: #e8ffe8;
    --muted: #7aad7a;
    --rare1: #78c7ff;
    --rare2: #c47eff;
    --rare3: #ffd700;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  #bg-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    opacity: 0.6;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    padding: 0 16px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  .header {
    text-align: center;
    padding: 28px 0 10px;
  }

  .header h1 {
    font-family: 'Bangers', cursive;
    font-size: 3.2rem;
    letter-spacing: 3px;
    color: var(--green-neon);
    text-shadow:
      0 0 10px #39ff1488,
      0 0 30px #39ff1444,
      3px 3px 0 var(--green-dark);
    line-height: 1;
  }

  .header .subtitle {
    font-size: 0.95rem;
    color: var(--muted);
    margin-top: 4px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .pepe-emoji {
    font-size: 2.4rem;
    display: inline-block;
    animation: pepe-bounce 1.8s ease-in-out infinite;
  }

  @keyframes pepe-bounce {
    0%, 100% { transform: translateY(0) rotate(-5deg); }
    50% { transform: translateY(-8px) rotate(5deg); }
  }

  .case-scene {
    width: 100%;
    max-width: 340px;
    aspect-ratio: 1;
    margin: 20px 0 10px;
    position: relative;
    cursor: pointer;
  }

  #case-canvas {
    width: 100%;
    height: 100%;
    border-radius: 24px;
    display: block;
  }

  .case-glow {
    position: absolute;
    inset: -8px;
    border-radius: 32px;
    background: radial-gradient(ellipse at 50% 80%, #39ff1422 0%, transparent 70%);
    animation: glow-pulse 2.5s ease-in-out infinite;
    pointer-events: none;
  }

  @keyframes glow-pulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  .stats-bar {
    display: flex;
    gap: 12px;
    width: 100%;
    max-width: 340px;
    margin-bottom: 16px;
  }

  .stat-chip {
    flex: 1;
    background: var(--card);
    border: 1px solid #1e4a1e;
    border-radius: 14px;
    padding: 10px 8px;
    text-align: center;
  }

  .stat-chip .val {
    font-family: 'Bangers', cursive;
    font-size: 1.5rem;
    color: var(--green-neon);
    letter-spacing: 1px;
  }

  .stat-chip .lbl {
    font-size: 0.65rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .open-btn {
    width: 100%;
    max-width: 340px;
    padding: 18px;
    font-family: 'Bangers', cursive;
    font-size: 1.8rem;
    letter-spacing: 3px;
    color: var(--bg);
    background: linear-gradient(135deg, var(--green-neon) 0%, var(--yellow) 100%);
    border: none;
    border-radius: 20px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 24px #39ff1444, 0 2px 8px #0005;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .open-btn:active {
    transform: scale(0.96);
    box-shadow: 0 2px 10px #39ff1422;
  }

  .open-btn:disabled {
    opacity: 0.5;
    cursor: default;
    transform: none;
  }

  .open-btn .btn-shine {
    position: absolute;
    top: -50%;
    left: -60%;
    width: 40%;
    height: 200%;
    background: linear-gradient(105deg, transparent, rgba(255,255,255,0.45), transparent);
    transform: skewX(-20deg);
    animation: btn-shine 3s ease-in-out infinite;
  }

  @keyframes btn-shine {
    0% { left: -60%; }
    40%, 100% { left: 120%; }
  }

  .prizes-grid {
    width: 100%;
    max-width: 340px;
    margin-top: 24px;
  }

  .prizes-grid h3 {
    font-family: 'Bangers', cursive;
    font-size: 1.3rem;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 12px;
    text-align: center;
  }

  .prizes-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .prize-row {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--card);
    border: 1px solid #1e4a1e;
    border-radius: 14px;
    padding: 10px 14px;
  }

  .prize-row .icon { font-size: 1.6rem; width: 32px; text-align: center; }

  .prize-row .info { flex: 1; }

  .prize-row .name {
    font-size: 0.9rem;
    font-weight: 900;
    line-height: 1.2;
  }

  .prize-row .chance {
    font-size: 0.72rem;
    color: var(--muted);
  }

  .badge {
    font-family: 'Bangers', cursive;
    font-size: 0.8rem;
    letter-spacing: 1px;
    padding: 3px 8px;
    border-radius: 8px;
  }

  .badge-common { background: #2a4a2a; color: #7aff7a; }
  .badge-rare { background: #1a2a4a; color: var(--rare1); }
  .badge-epic { background: #2a1a4a; color: var(--rare2); }
  .badge-legendary { background: #3a2a00; color: var(--rare3); }

  .result-overlay {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(8px);
    padding: 24px;
  }

  .result-overlay.active { display: flex; }

  .result-card {
    background: var(--card);
    border-radius: 28px;
    padding: 36px 28px;
    text-align: center;
    width: 100%;
    max-width: 360px;
    border: 2px solid var(--green-dark);
    position: relative;
    animation: result-in 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
  }

  @keyframes result-in {
    from { transform: scale(0.5) rotate(-10deg); opacity: 0; }
    to { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  .result-card.legendary { border-color: var(--rare3); box-shadow: 0 0 40px #ffd70055; }
  .result-card.epic { border-color: var(--rare2); box-shadow: 0 0 40px #c47eff44; }
  .result-card.rare { border-color: var(--rare1); box-shadow: 0 0 40px #78c7ff44; }

  .result-icon { font-size: 4.5rem; margin-bottom: 8px; display: block; }

  .result-img {
    width: 140px;
    height: 140px;
    object-fit: contain;
    border-radius: 16px;
    margin: 0 auto 12px;
    display: block;
  }

  .result-rarity {
    font-family: 'Bangers', cursive;
    font-size: 1rem;
    letter-spacing: 3px;
    margin-bottom: 8px;
  }

  .result-name {
    font-family: 'Bangers', cursive;
    font-size: 2rem;
    letter-spacing: 2px;
    line-height: 1.1;
    margin-bottom: 10px;
    color: var(--green-neon);
  }

  .result-desc {
    font-size: 0.9rem;
    color: var(--muted);
    line-height: 1.5;
    margin-bottom: 20px;
  }

  .result-actions {
    display: flex;
    gap: 10px;
  }

  .btn-again {
    flex: 1;
    padding: 14px;
    font-family: 'Bangers', cursive;
    font-size: 1.2rem;
    letter-spacing: 2px;
    background: linear-gradient(135deg, var(--green-neon), var(--yellow));
    color: var(--bg);
    border: none;
    border-radius: 14px;
    cursor: pointer;
  }

  .btn-share {
    flex: 1;
    padding: 14px;
    font-family: 'Bangers', cursive;
    font-size: 1.2rem;
    letter-spacing: 2px;
    background: transparent;
    color: var(--green-neon);
    border: 2px solid var(--green-neon);
    border-radius: 14px;
    cursor: pointer;
  }

  .confetti-container {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 99;
    overflow: hidden;
  }

  .confetti-piece {
    position: absolute;
    width: 10px;
    height: 10px;
    opacity: 0;
  }

  @keyframes confetti-fall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div class="confetti-container" id="confetti-container"></div>

<div class="container">
  <div class="header">
    <span class="pepe-emoji">🐸</span>
    <h1>PLUSH PEPE<br>CASE</h1>
    <p class="subtitle">Telegram Mini App</p>
  </div>

  <div class="case-scene" id="case-scene">
    <canvas id="case-canvas"></canvas>
    <div class="case-glow"></div>
  </div>

  <div class="stats-bar">
    <div class="stat-chip">
      <div class="val" id="opens-count">0</div>
      <div class="lbl">Открытий</div>
    </div>
    <div class="stat-chip">
      <div class="val" id="rare-count">0</div>
      <div class="lbl">Редких</div>
    </div>
    <div class="stat-chip">
      <div class="val" id="luck-val">?</div>
      <div class="lbl">Удача</div>
    </div>
  </div>

  <button class="open-btn" id="open-btn" onclick="openCase()">
    <span class="btn-shine"></span>
    🎰 ОТКРЫТЬ КЕЙС
  </button>

  <div class="prizes-grid">
    <h3>🏆 ПРИЗЫ</h3>
    <div class="prizes-list">
      <div class="prize-row">
        <div class="icon">🎨</div>
        <div class="info">
          <div class="name">Обычный стикер</div>
          <div class="chance">Шанс выпадения: 45%</div>
        </div>
        <span class="badge badge-common">COMMON</span>
      </div>
      <div class="prize-row">
        <div class="icon">🎁</div>
        <div class="info">
          <div class="name">NFT Подарок</div>
          <div class="chance">Шанс выпадения: 30%</div>
        </div>
        <span class="badge badge-rare">RARE</span>
      </div>
      <div class="prize-row">
        <div class="icon">💎</div>
        <div class="info">
          <div class="name">NFT Редкий Подарок</div>
          <div class="chance">Шанс выпадения: 15%</div>
        </div>
        <span class="badge badge-epic">EPIC</span>
      </div>
      <div class="prize-row">
        <div class="icon">👑</div>
        <div class="info">
          <div class="name">NFT Легендарный</div>
          <div class="chance">Шанс выпадения: 9%</div>
        </div>
        <span class="badge badge-epic">EPIC</span>
      </div>
      <div class="prize-row">
        <div class="icon">🧸</div>
        <div class="info">
          <div class="name">Плюшевый PEPE</div>
          <div class="chance">Шанс выпадения: 1%</div>
        </div>
        <span class="badge badge-legendary">LEGENDARY</span>
      </div>
    </div>
  </div>
</div>

<div class="result-overlay" id="result-overlay">
  <div class="result-card" id="result-card">
    <span class="result-icon" id="result-icon"></span>
    <img class="result-img" id="result-img" src="" alt="" style="display:none">
    <div class="result-rarity" id="result-rarity"></div>
    <div class="result-name" id="result-name"></div>
    <div class="result-desc" id="result-desc"></div>
    <div class="result-actions">
      <button class="btn-again" onclick="closeResult()">🔄 ЕЩЁ РАЗ</button>
      <button class="btn-share" onclick="shareResult()">📤 ПОДЕЛИТЬСЯ</button>
    </div>
  </div>
</div>

<script>
const PRIZES = [
  {
    id: "sticker_pepe",
    name: "Стикер PEPE",
    desc: "Классический стикер с PEPE для Telegram. Используй в любых чатах!",
    icon: "🎨",
    rarity: "COMMON",
    rarityClass: "common",
    chance: 45,
    color: "#7aff7a"
  },
  {
    id: "sticker_sad",
    name: "Стикер Sad PEPE",
    desc: "Грустный PEPE смотрит на тебя. Редкий стикер для ценителей.",
    icon: "😢",
    rarity: "COMMON",
    rarityClass: "common",
    chance: 0,
    color: "#7aff7a"
  },
  {
    id: "nft_basic",
    name: "NFT Подарок",
    desc: "Базовый NFT-подарок на блокчейне TON. Твоя первая цифровая собственность!",
    icon: "🎁",
    rarity: "RARE",
    rarityClass: "rare",
    chance: 30,
    color: "#78c7ff"
  },
  {
    id: "nft_rare",
    name: "NFT Редкий",
    desc: "Редкий NFT-подарок с уникальной анимацией. Таких мало!",
    icon: "💎",
    rarity: "EPIC",
    rarityClass: "epic",
    chance: 15,
    color: "#c47eff"
  },
  {
    id: "nft_legendary",
    name: "NFT Легендарный",
    desc: "Легендарный NFT! Один из немногих в существовании. Невероятная удача!",
    icon: "👑",
    rarity: "EPIC",
    rarityClass: "epic",
    chance: 9,
    color: "#c47eff"
  },
  {
    id: "plush_pepe",
    name: "Плюшевый PEPE",
    desc: "🎉 ДЖЕКПОТ! Ты выиграл легендарного Плюшевого PEPE! Это невероятно редкий приз!",
    icon: "🧸",
    rarity: "LEGENDARY",
    rarityClass: "legendary",
    chance: 1,
    img: "plushpepe.png",
    color: "#ffd700"
  }
];

let opensCount = 0;
let rareCount = 0;
let isAnimating = false;
let caseRenderer, caseScene, caseCamera, caseMesh, caseLid, caseGroup;
let bgRenderer, bgScene, bgCamera, bgParticles;

function initBgScene() {
  bgScene = new THREE.Scene();
  bgCamera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
  bgCamera.position.z = 5;

  bgRenderer = new THREE.WebGLRenderer({ canvas: document.getElementById('bg-canvas'), alpha: true, antialias: false });
  bgRenderer.setSize(window.innerWidth, window.innerHeight);
  bgRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));

  const geometry = new THREE.BufferGeometry();
  const count = 200;
  const positions = new Float32Array(count * 3);
  const colors = new Float32Array(count * 3);

  for (let i = 0; i < count; i++) {
    positions[i * 3] = (Math.random() - 0.5) * 20;
    positions[i * 3 + 1] = (Math.random() - 0.5) * 20;
    positions[i * 3 + 2] = (Math.random() - 0.5) * 10;
    const g = 0.3 + Math.random() * 0.7;
    colors[i * 3] = 0;
    colors[i * 3 + 1] = g;
    colors[i * 3 + 2] = 0;
  }

  geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

  bgParticles = new THREE.Points(geometry, new THREE.PointsMaterial({
    size: 0.06,
    vertexColors: true,
    transparent: true,
    opacity: 0.7
  }));

  bgScene.add(bgParticles);
}

function initCaseScene() {
  const canvas = document.getElementById('case-canvas');
  const w = canvas.clientWidth;
  const h = canvas.clientHeight;

  caseScene = new THREE.Scene();
  caseCamera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
  caseCamera.position.set(0, 0.5, 4.5);
  caseCamera.lookAt(0, 0, 0);

  caseRenderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
  caseRenderer.setSize(w, h);
  caseRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  caseRenderer.shadowMap.enabled = true;

  const ambientLight = new THREE.AmbientLight(0x224422, 1.5);
  caseScene.add(ambientLight);

  const greenLight = new THREE.PointLight(0x39ff14, 3, 10);
  greenLight.position.set(0, 2, 3);
  caseScene.add(greenLight);

  const purpleLight = new THREE.PointLight(0xff00ff, 1.5, 8);
  purpleLight.position.set(-2, -1, 2);
  caseScene.add(purpleLight);

  caseGroup = new THREE.Group();
  caseScene.add(caseGroup);

  const boxGeo = new THREE.BoxGeometry(2, 1.6, 2);
  const boxMat = new THREE.MeshStandardMaterial({
    color: 0x0a2a0a,
    metalness: 0.8,
    roughness: 0.2,
    emissive: 0x002200,
    emissiveIntensity: 0.3
  });
  caseMesh = new THREE.Mesh(boxGeo, boxMat);
  caseMesh.position.y = -0.2;
  caseGroup.add(caseMesh);

  const lidGeo = new THREE.BoxGeometry(2.05, 0.4, 2.05);
  const lidMat = new THREE.MeshStandardMaterial({
    color: 0x113311,
    metalness: 0.9,
    roughness: 0.15,
    emissive: 0x003300,
    emissiveIntensity: 0.5
  });
  caseLid = new THREE.Mesh(lidGeo, lidMat);
  caseLid.position.y = 0.8;
  caseGroup.add(caseLid);

  const edgeGeo = new THREE.TorusGeometry(1.5, 0.03, 8, 40);
  const edgeMat = new THREE.MeshStandardMaterial({ color: 0x39ff14, emissive: 0x39ff14, emissiveIntensity: 2 });
  const edge = new THREE.Mesh(edgeGeo, edgeMat);
  edge.rotation.x = Math.PI / 2;
  edge.position.y = 0.6;
  caseGroup.add(edge);

  const logoGeo = new THREE.CircleGeometry(0.4, 32);
  const logoMat = new THREE.MeshStandardMaterial({ color: 0x39ff14, emissive: 0x39ff14, emissiveIntensity: 1.5 });
  const logo = new THREE.Mesh(logoGeo, logoMat);
  logo.rotation.x = -Math.PI / 2;
  logo.position.y = 1.01;
  caseGroup.add(logo);
}

function animateBg() {
  requestAnimationFrame(animateBg);
  bgParticles.rotation.y += 0.0004;
  bgParticles.rotation.x += 0.0002;
  bgRenderer.render(bgScene, bgCamera);
}

let caseRotY = 0;
let lidOpenAngle = 0;
let lidOpening = false;
let caseShakeTime = 0;

function animateCase() {
  requestAnimationFrame(animateCase);
  const t = Date.now() * 0.001;

  caseRotY += 0.008;
  caseGroup.rotation.y = caseRotY;
  caseGroup.position.y = Math.sin(t * 1.2) * 0.08;

  if (lidOpening) {
    lidOpenAngle = Math.min(lidOpenAngle + 0.04, Math.PI * 0.65);
    caseLid.position.y = 0.8 + Math.sin(lidOpenAngle) * 0.8;
    caseLid.rotation.x = -lidOpenAngle;
    caseLid.position.z = -Math.sin(lidOpenAngle) * 0.8;
  }

  if (caseShakeTime > 0) {
    caseGroup.rotation.z = Math.sin(caseShakeTime * 20) * 0.12;
    caseShakeTime -= 0.05;
    if (caseShakeTime <= 0) caseGroup.rotation.z = 0;
  }

  caseRenderer.render(caseScene, caseCamera);
}

function getRandPrize() {
  const roll = Math.random() * 100;
  let cumulative = 0;
  const pool = [PRIZES[0], PRIZES[2], PRIZES[3], PRIZES[4], PRIZES[5]];
  const chances = [45, 30, 15, 9, 1];

  for (let i = 0; i < pool.length; i++) {
    cumulative += chances[i];
    if (roll < cumulative) return pool[i];
  }
  return pool[0];
}

function openCase() {
  if (isAnimating) return;
  isAnimating = true;

  const btn = document.getElementById('open-btn');
  btn.disabled = true;

  caseShakeTime = 1;
  lidOpening = false;
  lidOpenAngle = 0;
  caseLid.position.y = 0.8;
  caseLid.rotation.x = 0;
  caseLid.position.z = 0;

  setTimeout(() => {
    lidOpening = true;
  }, 400);

  setTimeout(() => {
    const prize = getRandPrize();
    showResult(prize);
    opensCount++;
    if (prize.rarityClass !== 'common') rareCount++;
    document.getElementById('opens-count').textContent = opensCount;
    document.getElementById('rare-count').textContent = rareCount;
    document.getElementById('luck-val').textContent = opensCount > 0 ? Math.round((rareCount / opensCount) * 100) + '%' : '?';
  }, 1600);
}

function showResult(prize) {
  const overlay = document.getElementById('result-overlay');
  const card = document.getElementById('result-card');
  const icon = document.getElementById('result-icon');
  const img = document.getElementById('result-img');
  const rarity = document.getElementById('result-rarity');
  const name = document.getElementById('result-name');
  const desc = document.getElementById('result-desc');

  card.className = 'result-card ' + prize.rarityClass;
  rarity.textContent = prize.rarity;
  rarity.style.color = prize.color;
  name.textContent = prize.name;
  desc.textContent = prize.desc;

  if (prize.img) {
    icon.style.display = 'none';
    img.src = prize.img;
    img.style.display = 'block';
  } else {
    icon.textContent = prize.icon;
    icon.style.display = 'block';
    img.style.display = 'none';
  }

  overlay.classList.add('active');

  if (prize.rarityClass === 'legendary' || prize.rarityClass === 'epic') {
    spawnConfetti(prize.color);
  }

  if (window.Telegram && window.Telegram.WebApp) {
    window.Telegram.WebApp.HapticFeedback.notificationOccurred(
      prize.rarityClass === 'legendary' ? 'success' : 'warning'
    );
  }
}

function closeResult() {
  document.getElementById('result-overlay').classList.remove('active');
  lidOpening = false;
  lidOpenAngle = 0;
  caseLid.position.y = 0.8;
  caseLid.rotation.x = 0;
  caseLid.position.z = 0;
  isAnimating = false;
  const btn = document.getElementById('open-btn');
  btn.disabled = false;
}

function shareResult() {
  const name = document.getElementById('result-name').textContent;
  const rarity = document.getElementById('result-rarity').textContent;
  const text = `🐸 Я открыл Plush PEPE Case и получил ${rarity} приз: ${name}! Попробуй и ты!`;

  if (window.Telegram && window.Telegram.WebApp) {
    window.Telegram.WebApp.sendData(JSON.stringify({
      action: 'share',
      prize: name,
      rarity: rarity,
      text: text
    }));
  } else if (navigator.share) {
    navigator.share({ text });
  } else {
    navigator.clipboard.writeText(text);
    alert('Скопировано!');
  }
}

function spawnConfetti(color) {
  const container = document.getElementById('confetti-container');
  container.innerHTML = '';
  const colors = [color, '#39ff14', '#ffd700', '#ff6d00', '#ff1493'];

  for (let i = 0; i < 60; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    const c = colors[Math.floor(Math.random() * colors.length)];
    piece.style.cssText = `
      left: ${Math.random() * 100}%;
      background: ${c};
      width: ${6 + Math.random() * 8}px;
      height: ${6 + Math.random() * 8}px;
      border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
      animation: confetti-fall ${1.5 + Math.random() * 2}s ${Math.random() * 0.5}s ease-in forwards;
    `;
    container.appendChild(piece);
  }
}

if (window.Telegram && window.Telegram.WebApp) {
  window.Telegram.WebApp.ready();
  window.Telegram.WebApp.expand();
}

window.addEventListener('load', () => {
  initBgScene();
  initCaseScene();
  animateBg();
  animateCase();
});

window.addEventListener('resize', () => {
  bgCamera.aspect = window.innerWidth / window.innerHeight;
  bgCamera.updateProjectionMatrix();
  bgRenderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</body>
</html>
