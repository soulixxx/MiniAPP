<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Данил Колбасенко — Кейс</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0e0e18;font-family:sans-serif;color:#fff;min-height:100vh;overflow-x:hidden}
.wrap{max-width:480px;margin:0 auto;padding:0 0 60px}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid #ffffff08}
.back-btn{display:flex;align-items:center;gap:6px;color:#888;font-size:13px;cursor:pointer;background:none;border:none;color:#aaa}
.fast-toggle{display:flex;align-items:center;gap:8px;font-size:12px;color:#aaa;cursor:pointer}
.tog{width:38px;height:22px;border-radius:11px;background:#2a2a3a;position:relative;transition:background 0.2s;flex-shrink:0}
.tog.on{background:#4f8ef7}
.tog::after{content:'';position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left 0.2s}
.tog.on::after{left:19px}

/* 3D CASE HERO */
.hero{display:flex;flex-direction:column;align-items:center;padding:28px 16px 16px;perspective:800px}
.case-name{font-size:22px;font-weight:900;margin-bottom:22px;letter-spacing:-0.3px}

.case-3d{width:220px;height:220px;position:relative;transform-style:preserve-3d;animation:float3d 4s ease-in-out infinite;cursor:pointer}
.case-3d:hover{animation-play-state:paused}
@keyframes float3d{
  0%,100%{transform:rotateX(5deg) rotateY(-8deg) translateY(0)}
  25%{transform:rotateX(8deg) rotateY(-15deg) translateY(-8px)}
  50%{transform:rotateX(4deg) rotateY(-5deg) translateY(-14px)}
  75%{transform:rotateX(7deg) rotateY(-12deg) translateY(-6px)}
}

.face{position:absolute;border-radius:16px;overflow:hidden}
/* FRONT */
.face-front{width:220px;height:220px;top:0;left:0;transform:translateZ(18px);background:linear-gradient(160deg,#2e1d08,#1a1108);border:1.5px solid #9B6E2A}
.case-fire-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 90%,#d05500 0%,#8b2f00 45%,transparent 75%)}
.case-fire-anim{position:absolute;bottom:0;left:0;right:0;height:90px}
.case-person{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:16px;z-index:2}
.person-avatar{font-size:78px;filter:drop-shadow(0 4px 16px rgba(0,0,0,0.9))}
.chest-row-hero{display:flex;gap:5px;margin-top:2px}
.ch{width:40px;height:34px;border-radius:6px;border:1.5px solid #c49a2a;display:flex;align-items:center;justify-content:center;font-size:16px;background:#6a4010}
.ch.big{width:54px;height:46px;font-size:22px;background:#5a3008}
.watermark{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);font-size:9px;color:#ffffff20;letter-spacing:0.1em;white-space:nowrap}

/* RIGHT side */
.face-right{width:18px;height:220px;top:0;left:220px;transform-origin:left center;transform:rotateY(90deg);background:linear-gradient(180deg,#3d2410,#1a0e06);border:1px solid #7a4e18}
/* BOTTOM */
.face-bottom{width:220px;height:18px;top:220px;left:0;transform-origin:top center;transform:rotateX(-90deg);background:linear-gradient(90deg,#3d2410,#2a1808,#3d2410);border:1px solid #7a4e18}

/* shadow */
.case-shadow{width:160px;height:24px;background:radial-gradient(ellipse,rgba(0,0,0,0.6) 0%,transparent 70%);border-radius:50%;margin-top:6px;animation:shadow-pulse 4s ease-in-out infinite}
@keyframes shadow-pulse{0%,100%{transform:scaleX(1);opacity:0.6}50%{transform:scaleX(0.8);opacity:0.3}}

/* glow ring */
.case-glow{position:absolute;width:260px;height:260px;top:-20px;left:-20px;border-radius:50%;background:radial-gradient(ellipse,#c85a0a33 0%,transparent 65%);pointer-events:none;animation:glow-pulse 2s ease-in-out infinite alternate}
@keyframes glow-pulse{0%{opacity:0.5}100%{opacity:1}}

.price-badge{display:flex;align-items:center;gap:7px;background:#1e1a10;border:1.5px solid #8B5E1A66;border-radius:12px;padding:9px 24px;margin-top:14px;font-size:17px;font-weight:800}
.star-gold{color:#f5c842}

/* OPEN BTN */
.open-btn{width:calc(100% - 32px);margin:14px 16px 0;padding:16px;background:linear-gradient(135deg,#e07820,#c85a0a);border:none;border-radius:14px;color:#fff;font-size:16px;font-weight:800;cursor:pointer;transition:opacity 0.15s,transform 0.1s;letter-spacing:0.3px;position:relative;overflow:hidden}
.open-btn::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.15),transparent)}
.open-btn:active{transform:scale(0.98);opacity:0.9}
.open-btn:disabled{opacity:0.45;cursor:default}

/* SECTION */
.sec-hdr{display:flex;align-items:center;gap:8px;padding:22px 16px 10px;font-size:12px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:0.07em}

/* 3D ITEMS GRID */
.items-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:0 16px}

.item-card-3d{perspective:500px;cursor:pointer}
.item-inner{position:relative;border-radius:14px;background:#161622;border:1px solid #ffffff0a;padding:14px;display:flex;flex-direction:column;align-items:center;gap:6px;transform-style:preserve-3d;transition:transform 0.15s,box-shadow 0.15s;transform:rotateX(0deg) rotateY(0deg)}
.item-card-3d:hover .item-inner{transform:rotateX(-6deg) rotateY(6deg) translateZ(6px);box-shadow:8px 8px 24px rgba(0,0,0,0.5),-2px -2px 8px rgba(255,255,255,0.03)}
.item-card-3d.legendary .item-inner{border-color:#f59e0b44;background:linear-gradient(160deg,#1e1a0a,#161208)}
.item-card-3d.epic .item-inner{border-color:#a78bfa44;background:linear-gradient(160deg,#150e20,#100c18)}
.item-card-3d.rare .item-inner{border-color:#60a5fa44;background:linear-gradient(160deg,#0a1020,#0d121e)}
.item-card-3d.common .item-inner{border-color:#ffffff12}

.item-3d-emoji-wrap{width:80px;height:80px;display:flex;align-items:center;justify-content:center;position:relative;transform-style:preserve-3d}
.item-3d-emoji{font-size:52px;display:block;transform:translateZ(12px);filter:drop-shadow(0 6px 14px rgba(0,0,0,0.7));transition:transform 0.15s}
.item-card-3d:hover .item-3d-emoji{transform:translateZ(22px) scale(1.05)}

/* Glow behind emoji */
.item-glow{position:absolute;width:60px;height:60px;border-radius:50%;opacity:0.25;filter:blur(16px);top:10px;left:10px}
.glow-legendary{background:#f59e0b}
.glow-epic{background:#a78bfa}
.glow-rare{background:#60a5fa}
.glow-common{background:#888}

.item-rarity-badge{position:absolute;top:8px;right:8px;font-size:9px;font-weight:700;padding:2px 7px;border-radius:99px}
.rb-legendary{background:rgba(245,158,11,0.15);color:#f59e0b}
.rb-epic{background:rgba(167,139,250,0.15);color:#a78bfa}
.rb-rare{background:rgba(96,165,250,0.15);color:#60a5fa}
.rb-common{background:rgba(255,255,255,0.08);color:#888}

.item-chance-badge{position:absolute;top:8px;left:8px;font-size:9px;background:#ffffff08;border-radius:6px;padding:2px 6px;color:#666}
.item-name{font-size:11px;font-weight:700;text-align:center;color:#ddd;line-height:1.3}
.item-prices{display:flex;align-items:center;gap:8px;margin-top:2px}
.item-ton{font-size:11px;color:#5bc8ff;font-weight:600}
.item-stars{font-size:11px;color:#f5c842;font-weight:600}

/* BEST DROPS */
.best-drops{padding:0 16px}
.drops-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px}
.drops-scroll::-webkit-scrollbar{height:3px}
.drops-scroll::-webkit-scrollbar-thumb{background:#2a2a3a;border-radius:99px}
.drop-card{flex-shrink:0;background:#161622;border:1px solid #ffffff08;border-radius:12px;padding:10px 10px 8px;text-align:center;width:86px;transition:border-color 0.15s}
.drop-card:hover{border-color:#ffffff18}
.drop-mult{font-size:9px;color:#f5c842;font-weight:700;margin-bottom:2px}
.drop-emoji{font-size:30px;display:block}
.drop-name{font-size:9px;color:#777;margin-top:3px;line-height:1.2;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.drop-val{font-size:10px;color:#f5c842;font-weight:700;margin-top:4px}

/* REEL MODAL */
.modal-ov{display:none;position:fixed;inset:0;background:#000000cc;z-index:50;align-items:flex-end;justify-content:center}
.modal-ov.open{display:flex}
.modal-box{width:100%;max-width:480px;background:#13131f;border-radius:24px 24px 0 0;padding:20px 0 36px;animation:slideUp 0.3s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-title{text-align:center;font-size:15px;font-weight:700;margin-bottom:16px;padding:0 16px;color:#ddd}

.reel-outer{overflow:hidden;position:relative;height:108px}
.reel-outer::before,.reel-outer::after{content:'';position:absolute;top:0;bottom:0;width:64px;z-index:2;pointer-events:none}
.reel-outer::before{left:0;background:linear-gradient(to right,#13131f,transparent)}
.reel-outer::after{right:0;background:linear-gradient(to left,#13131f,transparent)}
.reel-line{position:absolute;top:0;bottom:0;left:50%;transform:translateX(-50%);width:2px;background:#e07820;z-index:3}
.reel-line::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;border-top:10px solid #e07820}
.reel-line::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;border-bottom:10px solid #e07820}
.reel-track{display:flex;gap:6px;width:max-content;align-items:center;height:108px}
.reel-cell{width:80px;height:96px;flex-shrink:0;background:#1e1e2e;border:1px solid #ffffff0a;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px}
.reel-cell.win{border-color:#e07820;background:#e0782018}
.rc-emoji{font-size:32px}
.rc-name{font-size:9px;color:#aaa;text-align:center;padding:0 3px;line-height:1.2}

/* WIN RESULT */
.win-wrap{display:none;padding:0 20px;flex-direction:column;align-items:center;gap:10px;text-align:center}
.win-wrap.show{display:flex}
.win-emoji-3d{font-size:80px;animation:pop3d 0.6s ease;display:block;filter:drop-shadow(0 8px 24px rgba(0,0,0,0.8))}
@keyframes pop3d{0%{transform:scale(0.2) rotateY(-90deg);opacity:0}50%{transform:scale(1.25) rotateY(10deg)}70%{transform:scale(0.95) rotateY(-5deg)}100%{transform:scale(1) rotateY(0);opacity:1}}
.win-name{font-size:19px;font-weight:900}
.win-rar-pill{display:inline-block;font-size:12px;font-weight:700;padding:4px 16px;border-radius:99px;margin-bottom:4px}
.win-sub{font-size:12px;color:#444}
.win-actions{display:flex;gap:8px;width:100%;margin-top:6px}
.btn-sell{flex:1;padding:12px;background:#22c55e1a;color:#22c55e;border:1px solid #22c55e44;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer}
.btn-keep{flex:1;padding:12px;background:#ffffff08;color:#999;border:1px solid #ffffff10;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer}
.btn-again{width:100%;padding:14px;background:linear-gradient(135deg,#e07820,#c85a0a);border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:800;cursor:pointer;margin-top:6px}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(10px);background:#22c55e;color:#fff;padding:10px 22px;border-radius:99px;font-size:13px;font-weight:700;opacity:0;transition:all 0.3s;z-index:200;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="wrap">

  <!-- TOPBAR -->
  <div class="topbar">
    <button class="back-btn">&#8592; Вернуться</button>
    <div class="fast-toggle" onclick="toggleFast()">
      <span>&#9889; Открыть быстро</span>
      <div class="tog" id="tog"></div>
    </div>
  </div>

  <!-- 3D HERO -->
  <div class="hero">
    <div class="case-name">Данил Колбасенко</div>

    <div style="position:relative">
      <div class="case-glow"></div>
      <div class="case-3d" id="case3d" onclick="openCase()">

        <!-- FRONT FACE -->
        <div class="face face-front">
          <div class="case-fire-bg"></div>
          <svg class="case-fire-anim" viewBox="0 0 220 90" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
            <defs>
              <radialGradient id="rg1" cx="50%" cy="100%"><stop offset="0%" stop-color="#ff6a00" stop-opacity="0.95"/><stop offset="100%" stop-color="#ff4400" stop-opacity="0"/></radialGradient>
              <radialGradient id="rg2" cx="50%" cy="100%"><stop offset="0%" stop-color="#ffcc00" stop-opacity="0.8"/><stop offset="100%" stop-color="#ffaa00" stop-opacity="0"/></radialGradient>
            </defs>
            <ellipse cx="110" cy="85" rx="100" ry="32" fill="url(#rg1)">
              <animate attributeName="rx" values="100;112;94;108;100" dur="2.2s" repeatCount="indefinite"/>
            </ellipse>
            <ellipse cx="110" cy="80" rx="60" ry="24" fill="url(#rg2)">
              <animate attributeName="ry" values="24;30;20;28;24" dur="1.6s" repeatCount="indefinite"/>
            </ellipse>
            <path d="M10,90 Q25,55 50,68 Q62,30 80,58 Q90,8 110,48 Q130,8 140,58 Q158,30 170,68 Q195,55 210,90Z" fill="#e05500" opacity="0.55">
              <animate attributeName="d" values="M10,90 Q25,55 50,68 Q62,30 80,58 Q90,8 110,48 Q130,8 140,58 Q158,30 170,68 Q195,55 210,90Z;M10,90 Q30,48 52,72 Q65,26 82,54 Q92,6 110,52 Q128,6 138,54 Q155,26 168,72 Q190,48 210,90Z;M10,90 Q25,55 50,68 Q62,30 80,58 Q90,8 110,48 Q130,8 140,58 Q158,30 170,68 Q195,55 210,90Z" dur="1.3s" repeatCount="indefinite"/>
            </path>
            <path d="M30,90 Q45,62 65,72 Q72,42 88,65 Q95,28 110,52 Q125,28 132,65 Q148,42 155,72 Q175,62 190,90Z" fill="#ff8800" opacity="0.35">
              <animate attributeName="d" values="M30,90 Q45,62 65,72 Q72,42 88,65 Q95,28 110,52 Q125,28 132,65 Q148,42 155,72 Q175,62 190,90Z;M30,90 Q48,58 66,76 Q74,38 90,62 Q97,24 110,56 Q123,24 130,62 Q146,38 154,76 Q172,58 190,90Z;M30,90 Q45,62 65,72 Q72,42 88,65 Q95,28 110,52 Q125,28 132,65 Q148,42 155,72 Q175,62 190,90Z" dur="0.9s" repeatCount="indefinite"/>
            </path>
          </svg>
          <div class="case-person">
            <div class="person-avatar">🧔</div>
            <div class="chest-row-hero">
              <div class="ch">🧰</div>
              <div class="ch big">📦</div>
              <div class="ch">🔫</div>
            </div>
          </div>
          <div class="watermark">GiftsBattle</div>
        </div>

        <!-- RIGHT FACE -->
        <div class="face face-right" style="background:linear-gradient(180deg,#3d2008,#1a0e04)"></div>
        <!-- BOTTOM FACE -->
        <div class="face face-bottom" style="background:linear-gradient(90deg,#2a1406,#1a0e04,#2a1406)"></div>

      </div>
    </div>

    <div class="case-shadow"></div>

    <div class="price-badge">
      <span class="star-gold">&#11088;</span>
      <span>350</span>
    </div>
  </div>

  <!-- OPEN BUTTON -->
  <button class="open-btn" id="openBtn" onclick="openCase()">&#127381; Открыть кейс — 350 &#11088;</button>

  <!-- ITEMS -->
  <div class="sec-hdr"><span>&#129681;</span> Что в кейсе?</div>
  <div class="items-grid" id="itemsGrid"></div>

  <!-- BEST DROPS -->
  <div class="sec-hdr" style="margin-top:8px"><span>&#127942;</span> Лучшие дропы</div>
  <div class="best-drops"><div class="drops-scroll" id="dropsScroll"></div></div>

</div>

<!-- REEL MODAL -->
<div class="modal-ov" id="modal">
  <div class="modal-box">
    <div class="modal-title" id="modalTitle">Открываем кейс...</div>
    <div class="reel-outer" id="reelOuter">
      <div class="reel-line"></div>
      <div class="reel-track" id="reelTrack"></div>
    </div>
    <div class="win-wrap" id="winWrap">
      <div class="win-emoji-3d" id="winEmoji"></div>
      <div class="win-name" id="winName"></div>
      <div class="win-rar-pill" id="winRar"></div>
      <div class="win-sub" id="winSub"></div>
      <div class="win-actions">
        <button class="btn-sell" onclick="doSell()">&#128994; Продать</button>
        <button class="btn-keep" onclick="closeModal()">Оставить</button>
      </div>
      <button class="btn-again" onclick="closeModal();setTimeout(openCase,200)">&#127381; Ещё раз</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── DATA ──────────────────────────────────────────────────────
const ITEMS=[
  {name:"Gem Signet Feral Rage",    emoji:"💍", rarity:"legendary", ton:"1250",  stars:"125 000", chance:"0.3%",  sellBase:125000},
  {name:"Durov's Cap Seabreeze",    emoji:"🧢", rarity:"legendary", ton:"741",   stars:"74 100",  chance:"0.7%",  sellBase:74100},
  {name:"Mighty Arm Overlord",      emoji:"💪", rarity:"epic",      ton:"650",   stars:"65 000",  chance:"1.2%",  sellBase:65000},
  {name:"Precious Peach Elegance",  emoji:"🍑", rarity:"epic",      ton:"235",   stars:"23 599",  chance:"2.4%",  sellBase:23599},
  {name:"Artisan Brick Bomb",       emoji:"💣", rarity:"rare",      ton:"230",   stars:"23 000",  chance:"3.5%",  sellBase:23000},
  {name:"Artisan Brick Ice Mammoth",emoji:"🦣", rarity:"rare",      ton:"220",   stars:"22 000",  chance:"4.2%",  sellBase:22000},
  {name:"Genie Lamp Liquid Cat",    emoji:"🪔", rarity:"rare",      ton:"125",   stars:"12 500",  chance:"6.1%",  sellBase:12500},
  {name:"Artisan Brick Floppa",     emoji:"🧱", rarity:"rare",      ton:"95",    stars:"9 500",   chance:"9.3%",  sellBase:9500},
  {name:"Loot Bag (Random)",        emoji:"👜", rarity:"common",    ton:"82.99", stars:"8 299",   chance:"22%",   sellBase:8299},
  {name:"Hanging Star Insane",      emoji:"⭐", rarity:"common",    ton:"55",    stars:"5 500",   chance:"50.3%", sellBase:5500},
];

const BEST=[
  {emoji:"🧱",name:"Artisan Brick Fi...",  val:"9 500",  mult:"x27.14"},
  {emoji:"👜",name:"Loot Bag (Random)",    val:"8 299",  mult:"x23.71"},
  {emoji:"🎃",name:"Mad Pumpkin...",        val:"4 400",  mult:"x12.57"},
  {emoji:"🦅",name:"Rare Bird Icarus",     val:"3 000",  mult:"x8.57"},
  {emoji:"🏅",name:"Victory Medal...",     val:"2 900",  mult:"x8.29"},
  {emoji:"🍪",name:"Cookie Heart Yam...",  val:"2 800",  mult:"x8"},
  {emoji:"🧸",name:"Toy Bear Lapis...",    val:"2 399",  mult:"x6.85"},
  {emoji:"💎",name:"Crystal Shard...",     val:"1 800",  mult:"x5.14"},
];

const RC={legendary:"#f59e0b",epic:"#a78bfa",rare:"#60a5fa",common:"#888"};
const RB={legendary:"rgba(245,158,11,0.18)",epic:"rgba(167,139,250,0.18)",rare:"rgba(96,165,250,0.18)",common:"rgba(255,255,255,0.08)"};
const RL={legendary:"Legendary",epic:"Epic",rare:"Rare",common:"Common"};

// ── STATE ─────────────────────────────────────────────────────
let fastMode=false, spinning=false, pendingWin=null;

// ── INIT ──────────────────────────────────────────────────────
window.addEventListener('load',()=>{
  try{
    const tg=window.Telegram&&window.Telegram.WebApp;
    if(tg){tg.ready();tg.expand();}
  }catch(e){}
  renderItems();
  renderDrops();
  initMouseTilt();
});

// ── TOGGLE FAST ───────────────────────────────────────────────
function toggleFast(){
  fastMode=!fastMode;
  document.getElementById('tog').classList.toggle('on',fastMode);
}

// ── 3D MOUSE TILT ─────────────────────────────────────────────
function initMouseTilt(){
  const c=document.getElementById('case3d');
  c.addEventListener('mousemove',e=>{
    const r=c.getBoundingClientRect();
    const x=((e.clientX-r.left)/r.width-0.5)*30;
    const y=-((e.clientY-r.top)/r.height-0.5)*30;
    c.style.animation='none';
    c.style.transform=`rotateX(${y}deg) rotateY(${x}deg)`;
  });
  c.addEventListener('mouseleave',()=>{
    c.style.animation='';
    c.style.transform='';
  });
  c.addEventListener('touchmove',e=>{
    e.preventDefault();
    const t=e.touches[0];
    const r=c.getBoundingClientRect();
    const x=((t.clientX-r.left)/r.width-0.5)*20;
    const y=-((t.clientY-r.top)/r.height-0.5)*20;
    c.style.animation='none';
    c.style.transform=`rotateX(${y}deg) rotateY(${x}deg)`;
  },{passive:false});
  c.addEventListener('touchend',()=>{
    c.style.animation='';
    c.style.transform='';
  });
}

// ── RENDER ITEMS ──────────────────────────────────────────────
function renderItems(){
  const g=document.getElementById('itemsGrid');
  ITEMS.forEach(it=>{
    const d=document.createElement('div');
    d.className='item-card-3d '+it.rarity;
    d.innerHTML=`
      <div class="item-inner">
        <div class="item-chance-badge">${it.chance}</div>
        <div class="item-rarity-badge rb-${it.rarity}">${RL[it.rarity]}</div>
        <div class="item-3d-emoji-wrap">
          <div class="item-glow glow-${it.rarity}"></div>
          <span class="item-3d-emoji">${it.emoji}</span>
        </div>
        <div class="item-name">${it.name}</div>
        <div class="item-prices">
          <span class="item-ton">&#9685; ${it.ton}</span>
          <span style="color:#333;font-size:10px">/</span>
          <span class="item-stars">&#11088; ${it.stars}</span>
        </div>
      </div>`;
    // 3D tilt on hover (already handled by CSS), add mouse tilt
    const inner=d.querySelector('.item-inner');
    d.addEventListener('mousemove',e=>{
      const r=d.getBoundingClientRect();
      const x=((e.clientX-r.left)/r.width-0.5)*18;
      const y=-((e.clientY-r.top)/r.height-0.5)*18;
      inner.style.transform=`rotateX(${y}deg) rotateY(${x}deg) translateZ(6px)`;
    });
    d.addEventListener('mouseleave',()=>{
      inner.style.transform='';
    });
    g.appendChild(d);
  });
}

// ── RENDER DROPS ─────────────────────────────────────────────
function renderDrops(){
  const s=document.getElementById('dropsScroll');
  BEST.forEach(b=>{
    const d=document.createElement('div');
    d.className='drop-card';
    d.innerHTML=`<div class="drop-mult">${b.mult}</div><span class="drop-emoji">${b.emoji}</span><div class="drop-name">${b.name}</div><div class="drop-val">&#11088; ${b.val}</div>`;
    s.appendChild(d);
  });
}

// ── WEIGHTED RANDOM ───────────────────────────────────────────
function pickItem(){
  const chances=[0.3,0.7,1.2,2.4,3.5,4.2,6.1,9.3,22,50.3];
  const total=chances.reduce((s,c)=>s+c,0);
  let r=Math.random()*total;
  for(let i=0;i<chances.length;i++){r-=chances[i];if(r<=0)return ITEMS[i];}
  return ITEMS[ITEMS.length-1];
}

// ── BUILD REEL ────────────────────────────────────────────────
function buildReel(winPos,winner){
  const t=document.getElementById('reelTrack');
  t.innerHTML='';
  for(let i=0;i<40;i++){
    const g=i===winPos?winner:ITEMS[Math.floor(Math.random()*ITEMS.length)];
    const d=document.createElement('div');
    d.className='reel-cell'+(i===winPos?' win':'');
    d.innerHTML=`<span class="rc-emoji">${g.emoji}</span><div class="rc-name">${g.name}</div>`;
    t.appendChild(d);
  }
}

// ── OPEN CASE ─────────────────────────────────────────────────
function openCase(){
  if(spinning)return;
  spinning=true;
  document.getElementById('openBtn').disabled=true;
  const winner=pickItem();
  pendingWin=winner;

  if(fastMode){
    document.getElementById('reelOuter').style.display='none';
    document.getElementById('modal').classList.add('open');
    document.getElementById('modalTitle').textContent='Поздравляем! 🎉';
    showWinUI(winner);
    return;
  }

  document.getElementById('reelOuter').style.display='block';
  document.getElementById('winWrap').classList.remove('show');
  document.getElementById('modalTitle').textContent='Открываем кейс...';
  document.getElementById('modal').classList.add('open');

  const winPos=32;
  buildReel(winPos,winner);
  const track=document.getElementById('reelTrack');
  const iw=86;
  const cw=document.getElementById('reelOuter').clientWidth||360;
  const cx=cw/2-40;
  const tx=-(winPos*iw-cx);
  track.style.transition='none';
  track.style.transform='translateX(0)';
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      track.style.transition='transform 4.2s cubic-bezier(0.15,0.65,0.1,1)';
      track.style.transform=`translateX(${tx}px)`;
    });
  });
  setTimeout(()=>{
    document.getElementById('reelOuter').style.display='none';
    document.getElementById('modalTitle').textContent='Поздравляем! 🎉';
    showWinUI(winner);
  },4500);
}

// ── SHOW WIN ──────────────────────────────────────────────────
function showWinUI(w){
  const wrap=document.getElementById('winWrap');
  document.getElementById('winEmoji').textContent=w.emoji;
  document.getElementById('winName').textContent=w.name;
  const rar=document.getElementById('winRar');
  rar.textContent=RL[w.rarity];
  rar.style.background=RB[w.rarity];
  rar.style.color=RC[w.rarity];
  const n=Math.floor(Math.random()*9999+1).toString().padStart(4,'0');
  document.getElementById('winSub').textContent=`#${n} / 10 000  ·  ⭐ ${w.stars}`;
  wrap.classList.add('show');
}

// ── SELL ──────────────────────────────────────────────────────
function doSell(){
  if(!pendingWin)return;
  const val=Math.floor(pendingWin.sellBase*(0.75+Math.random()*0.3));
  closeModal();
  showToast(`Продано за ⭐ ${val.toLocaleString()} 💚`);
  pendingWin=null;
}

function closeModal(){
  document.getElementById('modal').classList.remove('open');
  document.getElementById('winWrap').classList.remove('show');
  document.getElementById('reelOuter').style.display='block';
  spinning=false;
  document.getElementById('openBtn').disabled=false;
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2600);
}
</script>
